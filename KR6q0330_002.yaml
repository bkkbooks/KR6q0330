嘉曰無生豈有意耶祖曰無意誰當分別永嘉曰分別亦非意祖曰善哉善哉少留一宿叢林自此稱為一宿覺兄弟一等是發足超方尋師訪道就中永嘉較別你看他一動一靜一語一默自是蓋天蓋地耀古騰今更看他繞禪床三匝振錫一下卓然而立是什麼氣槩無端六祖道夫沙門者具三千威儀八萬細行何得生大我慢也大屈哉永嘉曰生死事大無常迅速面赤不如語直祖曰何不體取無生了取無速將謂有多少奇特永嘉曰體本無生了本無速謾費分疏祖曰如是如是冬瓜印子永嘉方整威儀禮拜須臾告辭且道與振錫一下卓然而立相去多少祖曰返何速乎又却世情流布永嘉曰本自非動豈有速耶少說道理祖曰誰知非動喝一喝永嘉曰仁者自生分別不妨軟頑祖曰爾甚得無生之意又是冬瓜印子永嘉曰無生豈有意耶始終只認得一橛祖曰無意誰當分別何不與本分草料永嘉曰分別亦非意三十棒一棒也較不得祖曰善哉善哉少留一宿大小祖師放過永嘉了也如今兄弟跨人門戶是則也道箇生死事大無常迅速祇是才入僧堂裡便被一鉢五味羮換却舌頭一時忘却了也十二時中不是勾三攬四便是說七道八縱有一人半人真箇把作一件事在蒲團上不是昏沉便是散亂何曾有一斯須一頃刻如永嘉繞床三匝振錫一下卓然而立底時節又何曾知道體本無生了本無速又何曾知道分別亦非意日久月深未免打入長行粥飯群中去也所以道既隆釋種須紹門風諦審先宗是何標格須是發大勇猛立大志願不顧危亡一往直前不問是生是死是無明是煩惱是真如是般若是昏沉是散亂一斬斬為兩段赤骨律地跳將出來大洋海裡翻身須彌頂上著腳然後單單提起無上佛祖正印盡百億山河大地百億往古來今若聖若凡若草若木一印印定毫髮無餘竪起拂子云看看印文露也眼辦手親一逴逴得一任顛來倒去橫搭竪搭是神是鬼是邪是正悉與面門一搭教伊轉身無路回避無門喚作海印三昧亦謂之海印發光正恁麼時不見有生死亦復離涅槃不見有無明煩惱昏沉散亂亦復離真如解脫般若菩提還信得及麼已得入手不妨拈出對衆一搭印破三世佛祖面門也要燈籠露柱相共證明有麼有麼如無山僧不免借永嘉大師見六祖底拄杖畫一畫云畫開錦縫拈出正印普示諸人去也卓一下三要印開朱點窄未容擬議主賓分告香普說光陰易老果是無常迅速夢幻不堅豈非生死事大有力量漢一翻翻轉直得大地平沉乾坤獨露萬里長空纖塵不立森羅萬象俯仰折旋全體是箇大光明藏佛與衆生同一受用絲毫不異只為情生智隔想變體殊四聖六凡輪回三界之內善惡趣中無由出離遂勞我先聖脫珍御服著弊垢衣與爾同生同死同來同去同住如來無上妙明性海開佛知見示佛知見說無說有說是說非說空說假說權說實說正說偏說一乘圓頓至於教外別傳行棒行喝指空話空開三要玄門分四種料揀五位君臣一鏃破三關兩口無一舌即色明心附物顯理麻三斤乾屎橛庭前柏樹子狗子無佛性是皆一時方便如將蜜果換苦葫蘆又如將一百二十斤重擔一放放在你肩上只要知道盡是自家珍寶自家受用無窮而已伶俐漢不受人瞞道總是磚頭瓦礫殘羮餿飯不勞拈出大地山河本來清淨見聞知覺本自現成出生入死如同遊戲塵沙剎海自他不隔於毫釐十世古今始終不離於當念自是你自生障礙自作艱難自信不及咄信箇甚麼頭上豈可安頭鉢盂豈可安柄你若抵死更不知歸堅欲捕風捉影不妨竪起生鐵脊梁盡三百六十骨節八萬四千毛竅併作一箇無字一提提起斬斷昏沉散亂掀翻明暗色空夜半突出金烏照了空花水月大千沙界海中漚一切聖賢如電拂仰山到這裡已是有舌如結言詞俱喪不免將自己抹作微塵供養盡大地人去也三千里外掩鼻橫趨已喫老僧三十拄杖聞香聽氣途路之客莫教認毒藥作醍醐通身瀉下腸肚通身換却骨頭也須腦後一鎚死中再活自餘依依稀稀倣倣佛佛瞎驢趂大隊認魚目作明珠仰山這裡却用不著今夏三百六十僧多是諸方頭角罷參宿衲卍字堂前竿木隨身探水而已忽若傾湫倒嶽又却水泄不通你向什麼處與雪岩相見擬議之間莫怪霹𮦷閃電就中亦多有新發道意菩薩乍入叢林未知深淺切忌雜毒入心直須取一生不會下些實地工夫一踏到底始得切莫向古人冊子上尋今人口角下覔直饒學得盛水不漏莫教被明眼人一覷如水銀落地一時百雜碎了也參須實參悟須實悟閻羅大王不怕多語若論宗門下事擊石火閃電光指南作北換斗移星動若疾𦦨過風那裡覔他縫罅所以道有賓有主有體有用有收有放有殺有活有賞有罰有時全賞全罰有時全罰全賞有時賞中有罰罰中有賞有時賞即是罰罰即是賞賞罰俱明不明方見有賞有罰有時全生全殺有時全殺全生有時生殺同時俱不同時至於賓中有主主中有賓賓中賓主中主賓主交參主賓互換等間拈起一微塵便有如是賓主有如是體用有如是收放有如是生殺有如是賞罰豈你杜撰長老杜撰衲子認些螢火之光可以擬議者哉雖然太平不用間戈甲一統山河似鏡清告香普說參方上士問道英靈舉足動步須看先輩典刑德山見龍潭吹滅紙燭徹法源底入門便棒打風打雨臨濟喫黃檗三頓痛棒摟出心肝入門便喝如雷如霆自餘隔江招手望見剎竿鰲山店上畫角聲中總是路途之客無足道者你輩後生晚進不辨春秋不分晝夜被昏沉散亂縛作一束滯在無魂必死之鄉也道我參方問道得不逢人愧悚者哉討掛搭時無一人不道生死事大無常迅速才跨僧堂門便不見有無常不知有生死但知趂大隊喫粥飯屙屎送尿隨人上下而已誰管你狗子佛性無麻三斤庭前柏樹子便生佛出世也只道是西天老比丘可謂是絲毫無繫直透大休大歇大安樂田地者矣其奈依稀相似端的不然腳又疼背又痛坐一霎禪喫一頓飯兩腳如槌打相似也好恓惶也好生受兄弟只這便是生死無常到來時節只這便是父母未生本來面目現前時節若能如是領略得去不越一念親證如來清淨法身不動一塵親入如來寶明空海歷三大阿僧祇劫不離當念遍十方恆河沙世界不離目前演百千無量妙義說百千無量妙法總不離這箇時節還信得及麼若信不及將此深心奉塵剎是則名為報佛恩竪起生鐵脊梁提起一箇無字如一座須彌山頂在額角頭正恁麼時自然不見有昏沉亦不見有散亂腳也不疼背也不痛孜孜爾念念爾不覺不知噴地一下親見三世諸佛法報化金剛正體放光動地照塵沙剎盡是金色光明世界森羅萬象草木叢林盡是寶華王座出微妙音演微妙法普度一切群生平等成佛現前清衆不分內外不間親疏不問上中下座有學無學已出世未出世盡是在須彌燈王會中與釋迦如來同受記莂於五百劫後同時成佛各據一國土各轉四諦法輪各度無量衆生轉度未度轉化未化直待衆生界空而後已是則故是却須回光返照自家真箇是那箇成佛底面孔也無亦須各各自家檢點從朝至暮還得成片段也無還得一絲毫無間斷也無還得一絲毫不犯叢林規矩像箇衲僧去就也無自其不然未免只是虗消信施唐喪光陰豈不孤負行腳本志動是二三百里二三千里拋離鄉井父母師長成得箇甚麼邊事豈不自家奮發自生勉勵勇猛更加勇猛精進更加精進提一箇無字如合眼跳黃河盡命一跳必有契悟底時節但要寬著期限急下手腳以悟為則不得將心待悟便被一箇悟字一礙礙住直待彌勒下生也無箇悟底時節喝一喝悟箇甚麼直下坐斷報化佛頭無第二人無第二念一切處現成一切處成見山是山水是水僧是僧俗是俗直饒擘開太華透出黃河也只是箇山青水緑間看粉節過墻添得數莖新竹聖恩寬大佛法中興無如此日祖道荒凉叢林凋喪無甚此時你這一隊漢一百里二百里一千里二千里總道來仰山寺裡依附廣衆親近師友參禪學道究明己躬下生死大事却只麼隨群逐隊業識茫茫爭人爭我爭是爭非爭先爭後驀越叢林埋沒自己唐喪光陰虗消信施輕欺天地慠慢佛祖略不勉勵抖擻自己返面自看是我畢竟有甚麼長處禪作麼生參道作麼生學死生大事作麼生透縱使有一知半見也是口耳沿習訛謬語言認驢鞍橋作阿爺下頷指鹿為馬喚鐘作甕所謂一盲引衆盲相牽入火坑者是也求一箇半箇向佛祖命根下直斷一刀佛祖頂𩕳上倒行一步萬中無一多只寮舍裡經案頭鐘樓鼓樓上佛殿藏殿裡長廊下聚頭接耳情識摶量識情解注傳授裏私佛法殊不知古人一時方便垂慈流落一言半句如蟲禦木偶爾成文你若著意追求著實理論又却全體不相似了也直饒注得明白又明白解得分曉又分曉隔截生死一念子還曾破也未面前五陰六塵還曾開也未仰山門下論實不論虗我在江浙時有一種住大院尊宿口裡水漉漉地築一肚皮殘羮餿飯一味穿鑿古今拈起拂子東擊西敲撒出一肚皮野狐涎涕直得遍地狼狼藉藉臭不可聞有一種不識好惡漢攬著這般臭氣喚作醍醐上味為世所珍蘊在八識田中如油入麵永取不出氣習薰陶枝蔓滋長子又生孫孫又生子莫不相傳授互相證據各各自謂會禪會道自己未曾明白先要龜鑑他人開室舉話受人請益寫法語示因緣滿紙盈筆說相似葛藤誑惑江湖聾瞽後學造地獄因結無間果千佛出世不通懺悔正因行腳正因辦道正因做工夫本色道流直須寬作程限急著手腳以悟為則若貪速效又貪易入便被這一種黨類勾引在草窠中成就野狐知見野狐伎倆半青半黃不分不曉朧朧倣倣佛佛如魂不散底死人相似則是箇焦芽敗種若是有力量漢直須取一生不會今生不了更有來生來生不了更有後世曠大劫來生死無明煩惱與天地同根要一翻翻轉超過三大阿僧祗劫與佛齊肩豈易事也哉今夏一衆老成亦多英俊不少半是擎頭戴角半是伏爪藏牙必欲與生死二字討箇明白是故諸路鄉頭力到侍者寮陳請必欲老僧為衆告香我心裡道今年七十老不以筋力為能成龍者從他上天成蛇者從他竄草而況老僧無禪無道無見無聞生平不事方冊又無記持說箇什麼即得只有箇狗子無佛性話揚下糞掃堆頭四十餘年了也只得拈出布施諸人從教西咬東咬橫嚼竪嚼忽然失口咬碎直得山河大地森羅萬象盡底平沉一大藏教五千四十八卷一千七百則葛藤氷消瓦解生死與去來不妨自由自在若是逐旋參逐旋透逐旋和會逐旋歡喜叢林大有人在非吾所知
