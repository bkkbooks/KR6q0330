body:
  text: 普說仰山普說舉天衣懷禪師舉古人云五蘊山頭一段空同門出入不相逢無量劫來賃屋住到頭不識主人翁後有古宿拈云既不識他當初問甚麼人賃天衣又云古人與麼拈大遠在何故須知死人路上有活人出身處活人路上死人無數那箇是活人路上死人無數那箇是死人路上活人出身處若明得拈却炙脂帽子脫却鶻臭布衫妙喜云天衣古佛美則美矣善則未善遮一隊不唧𠺕漢只知踏步向前不覺四稜塌地仰山不免為伊從頭扶起五蘊山頭一段空髑髏裡眼睛同門出入不相逢擬向甚麼回避無量劫來賃屋住自家祖業却作他人契券到頭不識主人翁用識作甚麼既不識他當初問甚麼人賃更求牙保那古人與麼拈大遠在將謂無人證明何故須知死人路上有活人出身處點即不到活人路上死人無數到即不點那箇是死人路上活人出身處作麼作麼那箇是活人路上死人無數低聲低聲若也會得拈却炙脂帽子脫却鶻臭布衫添一重了也妙喜老漢道天衣古佛美則美矣善則未善慣將烏豆換人眼睛雖然妙喜不知已被天衣換却是汝諸人還知落處麼若也未知須向烏豆未萌已前挨得一線路子透始得如何是烏豆未萌以前消息良久云遮裡領略得去便見五蘊山頭一段空真箇是同門出入不相逢無量劫來賃屋住且喜到家到頭不識主人翁話墮了也且道是古宿話墮天衣話墮妙喜話墮仰山話墮若也明辨得下雲門問僧光明寂照遍河沙豈不是張拙秀才語僧云是放過雲門老漢了也臺山路上有一婆子見僧問臺山路向什麼處去婆云驀直去僧才行婆云好箇阿僧又與麼去後來傳至趙州州云待我去與汝勘破州至彼亦如是問婆亦如是答歸來道臺山路上婆子我為汝勘破了也且道趙州勘婆子與雲門話墮相去多少若也向遮裡識得趙州心肝五臟雲門三百六十骨節被你一時穿透雪峰在德山作飯頭一日飯遲自托鉢下堂雪峰問云鐘未鳴鼓未響托鉢向甚麼處去德山低頭歸方丈死水不藏龍岩頭聞云遮老漢未會末後句在遍地刀鎗德山喚岩頭問汝不肯老僧那翻轉面皮來也岩頭密啓其意錦包特石爛似泥團德山次日上堂果別岩頭拍手云且喜老漢會末後句雖然只得三年且道還出得德山低頭歸方丈也無參學漢須是具三千里外定誵訛底眼未曾點著便知落處始得若欲向遮裡討他末後句勘破婆子話墮了也更待達磨面壁九年始得不然且待彌勒下生大凡須是揩磨自己明白揀辨古今是非得明自己不明古今是你工夫未到田地未穩明得古今不明自己是你關鍵不透眼目不明當知自己即是古今古今即是自己古人因你自己不明為你自己分上等間拈出一星子放在面前直是蓋天蓋地照古照今何曾有一絲毫情識知見到你穿鑿解會你才向這裡起一念要去明他古今會箇自己便被他一箇明字與會字隔作兩段去也所以道情生智隔想變體殊只如情未生時隔箇甚麼須是向遮裡一晈百雜碎不見有古今自己始得莫只悠悠漾漾虗度時光直待臘月三十日眼光落地不知何往只如前日顯首座標上座二人死了燒了即今在什麼處苟或不知去處撞入驢胎馬腹與異類中總不見得是汝諸人即今在這裡兩腳著地還知去處麼若也知得便見死人面前有活人出身處活人面前有死人無數古今即自己自己即古今而亦不妨古今自古今自己自自己死人自死人活漢自活漢然後却向這裡打一箇回合塵毛剎海自他不隔於毫端十世古今終始不離於當念復云提起即有放下即無作如是見便見親疏譬如鑄鏡成像像成後光在甚麼處通身沒可得遍界不曾藏佛法下衰無甚此時全仗你後生晚進發大勇猛負大志願赤手扶持隻肩擔負兄弟可惜許法門廣大莫孤負佛祖建立垂慈法乳之恩莫孤負國王外護匡扶水土之恩莫孤負父母師長養育剃度之恩莫孤負自己出家行腳之志莫虗消信施莫虗度光陰時不待人轉眼便是來生此身不向今生度更向何生度此身莫待臨渴掘井莫待臘月三十日到來眼光欲落未落貪生怖死手腳忙亂一似落湯螃蟹到那時縱欲回光返照辦此道以破生死遲了也著手腳不辦了也莫教被一陳業風吹入十八重無間地獄中去被閻羅老漢與你打算火帳問你索飯錢有鐵枷枷你項有鐵棒打你骨臀到那時喚爺不應呌娘不聞縱有親爺親娘親兄親弟救你不得也平生所作善不善業一時現前碓搗磨磨無有了日縱出離化生也只在六道中輪回至為虼䖱螻蟻在廁坑中頭出頭沒誠謂是袈裟下失却人身真箇是苦何不趂如今身強力健五體康安四肢輕利打教徹去討教明白去何幸又得在此名山大澤神龍世界祖師法窟安單僧堂明淨粥飯精潔湯火穩便你若不向這裡打教徹去是你自暴自棄自甘陸沈為下劣愚癡之漢你若果是茫無所知何不也博問先覺凡遇五參見曲彔床上箇漢胡說亂道何不也歷在耳根反覆自家尋思看畢竟是箇什麼道理三世諸佛謂之以一大事因緣故出現於世謂之開佛知見示佛知見悟佛知見入佛知見佛之知見別也無他只是你一切人十二時中一箇折旋俯仰見聞覺知而已只是你即今在這裡挨肩並足聽曲彔床上箇漢鼓兩片皮忉忉怛怛一段孤明歷歷者是自是你自信不及不能直下承當領箇現成受用馬祖謂即心是佛即佛是心心外無佛佛外無心佛是覺義蓋謂你從無量劫來流浪生死背覺合塵為生死漂蕩為愛河汩沒為無明煩惱昏沉散亂所要這一著子脫爾現前卒不能得所以勞他先聖𮞏相出興分宗列派激濁揚清餘波末流至今尚在兄弟佛法二字難遭難遇莫教打箇翻身墮異類中去便不聞佛法了也須是發大勇猛一往直前提起金剛寶劍向他佛祖頭上坐佛祖頭上臥始得山僧到這裡叨冒主席已是匙挑不上行解荒蕪去古遠矣全仗你後生晚進憤一口氣出來為他佛祖雪屈前日有兩箇兄弟來侍者寮說要上方丈請益我與侍者說每遇五參須說做工夫一段他何不領略又何須到方丈聽說方才便是這裡無口傳心授底佛法待此後五參把我自己為伊再說一遍山僧五歲出家在上人侍下聽與賓客交談便知有這事便信得及便學坐禪一生愚鈍喫盡萬千辛苦十六歲為僧十八歲行腳鋭志要出來究明此事在雙林鐵橛遠和尚會下打十方從朝至暮只在僧堂中不出戶庭縱入衆寮至後架袖手當胸徐來徐往更不左右顧目前所視不過三尺洞下尊宿要教人看狗子無佛性話只於雜識雜念起時向鼻尖上輕輕舉一箇無字才見念息又却一時放下著只麼默默而坐待他純熟久久自契洞下門戶工夫綿密困人動是十年二十年不得到手所以難於嗣續我當時忽於念頭起處打一箇返觀於返觀處這一念子當下氷冷直是澄澄湛湛不動不搖坐一日只如彈指頃都不聞鐘鼓之聲過了午齊放參都不知得長老聞我坐得好下僧堂來看曾在法座上贊揚十九去靈隱挂搭見善妙峰妙峰死石田繼席頴東叟在客司我在知客寮見處州來書記說道欽兄你這工夫是死水不濟得事動靜二相未免打作兩橛我被他說得著真箇是才於坐處便有這境界現前才下地行與拈匙放筯處又都不見了他又道參禪須是起疑情大疑大悟小疑小悟不疑不悟須是疑公案始得他雖不甚做工夫他自不菴會下來不菴是松源之子說話終是端正我當下便改了話頭提箇乾屎橛一味東疑西疑橫看竪看因改這話頭前面生涯都打亂了也雖是封了被脅不沾席從朝至暮行處坐處只是昏沈散亂膠膠擾擾要一霎時淨潔也不能得聞天目和尚久侍松源是松源的子必得松源說話移單過淨慈挂搭懷香詣方丈請益大展九拜他問我如何做工夫遂與從頭直說一遍他道你豈不見臨濟三度問黃蘗佛法的的大意三遭痛棒末後向大愚肋下築三拳道元來黃蘗佛法無多子汝但恁麼看又云混源住此山時我做暫到入室他舉話云現成公案未入門來與你三十棒了也但恁麼看天目和尚這箇說話自是向上提持我之病痛自在昏沉散亂處他發藥不投我不歡喜心中未免道你不會做工夫只是伶俐禪尋常請益末上有一炷香禮三拜謂之謝因緣我這一炷香不燒了也依舊自依我每常坐禪是時漳泉二州有七箇兄弟與我結甲坐禪兩年在淨慈不展被脅不沾席外有箇修上座也是漳州人不在此數只是獨行獨坐他每日在蒲團上如一箇鐵橛子相似在地上行時挺起脊梁垂兩隻臂開了兩眼也如箇鐵橛子相似朝朝如是日日一般我每日要去親近他與他說話些子才見我東邊來他便西邊去才見我西邊來他便東邊去如是二年間要親近些子更不可得我二年間因不到頭捱得昏了困了日裡也似夜裡夜裡也似日裡行時也似坐時坐時也似行時只是一箇昏沉散亂輥作一團如一塊爛泥相似要一須臾淨潔不可得一日忽自思量我辦道又不得入手身上衣裳又破碎也皮肉又消爍也不覺淚流頓起鄉念且請假歸鄉自此一放都放了也兩月後再來參假又却從頭整頓又却到得這一放十倍精神元來欲究明此事不睡也不得你須是到中夜爛睡一覺方有精神一日我自在廊廡中東行西行忽然撞著修兄遠看他但覺間間地怡怡然有自得之貌我方近前去他却與我說話就知其有所得我却問他去年要與你說話些箇你只管回避我如何他道尊兄真正辦道人無剪爪之工更與你說話在他遂問我做處如何與他從頭說一遍了末後道我如今只是被箇昏沉散亂打併不去他云有甚麼難自是你不猛烈須是高著蒲團竪起脊梁教他節節相拄盡三百六十骨節八萬四千毛竅併做一箇無字與麼提起更討甚麼昏沉散亂來我便依他說尋一箇厚蒲團放在單位上竪起脊梁教他節節相拄透頂透底盡三百六十骨節一提提起正如一人與萬人敵相似提得轉力轉見又散到此盡命一提忽見身心俱忘但覺目前如一片銀山鐵壁相似自此行也如是坐也如是清淨三晝夜兩眼不交睫到第三日午後自在三門下如坐而行忽然又撞見修兄他問我在這裡作甚麼對他道辦道他云你喚甚麼作道遂不能對轉加迷悶即欲歸堂坐禪到後門了又不覺至後堂寮中首座問我云欽兄你辦道如何與他說道我不合問人多了剗地做不得他又云你但大開了眼看是甚麼道理我被提這一句又便抽身只要歸堂中坐方才翻身上蒲團面前豁然一開如地陷一般當是時呈似人不得說似人不得非世間一切相可以喻之我當時無著歡喜處便下地來尋修兄他在經案上才見我來便合掌道且喜且喜我便與他握手到門前柳堤上行一轉俯仰天地間森羅萬象眼見耳聞向來所厭所棄之物與無明煩惱昏沉散亂元來盡自妙明真性中流出自此目前露倮倮地靜悄悄地浮逼逼地半月餘日動相不生可惜許不遇具大眼目大手段尊宿為我打併不合向這裡一坐坐住謂之見地不脫礙正知見每於中夜睡著無夢無想無聞無見之地又却打作兩橛古人有寤寐一如之語又却透不得眼若不睡諸夢自除心若不異萬法一如之說又都錯會了也凡古人公案有義路可以咬嚼者則理會得下無義路如銀山鐵壁者又却都會不得雖在無準先師會下許多年每遇他開室舉主人公話便可以打箇𨁝跳莫教舉起衲僧巴鼻佛祖爪牙更無你下口處有時在法座東說西說又並無一語打著我心下事又將佛經與古語從頭檢尋亦並無一句可以解我此病如是礙在胸中者僅十年後來因與忠石梁過浙東天育兩山作住一日佛殿前行間自東思西忖忽然擡眸見一株古柏觸著向來所得境界和底一時揚下礙膺之物撲然而散如暗室中出在白日之下走一轉相似自此不疑生不疑死不疑佛不疑祖方始得見徑山老人立地處正好三十拄杖何故若是大力量大根器的人那裡有許多曲折德山見龍潭於吹滅紙燭處便道窮諸玄辨若一毫置於太虗竭世樞機似一滴投於巨壑自此拈一條白棒掀天掀地那裡有你近傍處水潦和尚被馬祖一踏便道百千法門無量妙義盡向一毛頭上識得根源高亭見德山招手便乃橫趨永嘉見曹溪只是一宿覺你輩後生晚進若欲咨參箇事步趍箇事須是有這箇標格具這箇氣槩始得若是我說底都不得記一箇元字腳記著則誤你平生所以諸大尊宿多不說做處與悟門見地謂之以實法繫綴人土也消不得是則固是也有大力量有宿種不從做處來無蹊徑可以說者也有全不曾下工夫說不得者也有半青半黃開口自信不及者誠謂刁刀相似魚魯參差若論履踐箇事如人行路一般行得一里二里三里四五里便歇只說得一里二里三里四五里話行得百里千里萬里見得千里萬里境界說得千里萬里話須知此事更在百千萬里盡乾坤之外那裡在那裡汝等諸人聞恁麼道須是自家具眼各能緇素是否揀擇青黃始得若也似鴨聞雷如水澆石便從達磨大師與釋迦老子肚裡過我道也只是間久立道場山立僧普說禪客出問云天氣秋高玉露垂庭前黃菊綻東籬臨濟德山施棒喝不問知音更問誰答云知音知後更誰知進云與麼則水向石邊流出冷風從花裏過來香答云間言語進云如何是德山棒答云穿過你髑髏進云如何是臨濟喝答云還聞麼進云記得昔日臨濟和尚示衆道我有時一喝如金剛王寶劒有時一喝如踞地師子有時一喝作探竿影草有時一喝不作一喝用此意如何答云從頭問將來進云如何是一喝如金剛王寶劒答云切忌傷鋒犯手進云如何是一喝如踞地師子答云真箇可憐生進云如何是一喝作探竿影草答云不得面前背後進云如何是一喝不作一喝用答云却須參始得進云探竿影草驗來人一喝須教海嶽昏不是法王親的子等間誰敢踏渠門答云且緩緩進云只如釋迦世尊四十九年橫說竪說說不盡底事今夜座元禪師如何布施答云猶嫌少在進云選佛若無如是眼宗風那得到如今師拈起拄杖云只這是德山棒卓一下只這是臨濟喝伶俐漢向未舉已前一提提得水向石邊流出冷風從花裡過來香其或未然更煩拄杖子借德山鼻孔與臨濟出氣去也卓一下金剛寶劒卓一下踞地師子卓一下探竿影草只如一喝不作一喝用與前三喝是同是別若謂是同臨濟大師未肯點頭在若謂是別爭奈被德山老漢一串穿却鼻孔畢竟德山臨濟二大老鼻孔與四十九年說不盡底相去多少乃靠拄杖復云既隆釋種須紹門風諦審先宗是何標格豈不見臨濟三度扣黃蘗被六十拄杖如蒿枝拂相似又不見德山於龍潭欥滅紙燭處脫然悟去道窮諸玄辨若一毫置於太虗竭世樞機似一滴投于巨壑二大老可謂窮千聖之骨髓徹萬法之根源流芳後世垂範于叢林者矣今時參學道流又須帶些子眼筋覷破他古人敗闕處始得若也覷得破便見黃蘗龍潭雖似金翅擘海直取龍吞要且未免作死馬醫臨濟德山是則不離當處獨跨大方其奈捨長就短埋沒己靈要稱百世宗師未得在道場門下不說覷破覷不破盡是在他頂𩕳上放屙底漢如今既在這裡聚首片時欽上座未免借堂上老人威光掀翻海嶽撞碎太虗也要大家證據雖然王令正嚴豈可攙行奪市今朝九月一打板坐禪首座謂之表率或恐一人半人新發意菩薩欲覷捕此道者未有入頭處未有下手腳處或工夫有間而不得成片段或少有歡喜不復加鞭以求正悟或已有悟門為悟所迷光影不脫礙正知見或為勝妙快樂所墮在解脫深坑轉身不得或於古今差別機緣有意味可以啖者一一計較得行無意味難於咬嚼者又却分疏不下或為一切奇言妙句奧理玄文障在八識田中拋捨不下謂之雜毒入心如油入麵永取不出如今要得通上徹下一翻翻轉須是將一則古人沒意智底話頭如生冤家與之作對直是撲一交倒地始得若是未有這箇消息直饒行腳走盡天涯海角口裡記盡落索春秋打開鋪席一似賣狼虎藥只益戲論誑惑後昆自己衣單下半文不直底一著畢竟不曾摸著若是真箇卒地斷嚗地折底漢眼目定靜言語提持著著去離泥水脫略窠臼一切處一切時只麼平帖帖地那裡恁麼生生獰獰吒吒沙沙道我無敵於天下者也這箇喚作西天九十六種之數誇張知解該抹聖賢望吾佛祖之道遠之遠矣若是具正因有志之士莫被這一種𡏖圾性地泛濫心源須信有正宗之下單傳直截之妙始得如趙州一箇無字真箇是一口吹毛利劒可以破疑團斷生死空萬法融古今只貴利根上智撥著便轉撩著便行然後不妨與趙州老漢同一眼目同一受用以至總萬別千差之要開千差萬別之門全賓全主全體全用全放全收全生全殺而總不外此矣若是性根遲鈍操捨不行却須竪起生鐵脊梁向長連床上厚著蒲團挺身而坐盡三百六十骨節與八萬四千毛竅併作一箇無字握兩拳頭撐兩眼睛一提提起便欲斬為兩段能如是著鞭如是用力何患乎不成片段何患乎不到頭似覺提不起時轉覺熱悶悶時與昏昏擾擾時却須全體一放放下翻轉身來就地略行數步於行處亦如是著鞭如是用力只當下別是一般精神又復翻身上蒲團挺身而坐則胸次中酌然如銀山鐵壁虗勞勞地靜悄悄地何處有一絲毫動相有一絲毫異相到這箇時節却不得守在這裡又須翻身下地如坐而行然後又復如行而坐晝不足繼之以夜夜不足繼之以旦翻來覆去提去提來不知不覺忽然拶透如貧得寶似暗得燈如雲開見日如水底火發盡十方剎海是箇大圓鏡盡十方剎海是箇自己謂之心空及第見徹父母未生前面目若說明大法透古今以盡佛祖之奧喻如入海方始插得腳前面洪濤際天巨浪沃日那裡更在那裡切不得聽人道悟是表顯之說箇事本來成現只消一笑知歸是則因是其奈隔壁摶謎青黃赤白長短方圓畢竟不曾親見被人掇在面前分明是差珍異寶却喚作瓦礫磚頭分明是瓦礫磚頭却喚作差珍異寶又不得聽人道參禪本是安樂法門那裡有許多生生受受勞勞攘攘只消默默提撕久久自契這箇喚作死水浸石頭永無醒動底分子又不得聽人道只這無字是箇繫驢橛子只消提來頓在面前牢牢把定繫住這一念子念頭純熟自然到家殊不知這一念子如燈焰焰如水涓涓眨得眼來千里萬里自非潑撒一回那裡被你把得定繫得住又不得聽人道只消於聞聲見色處領攬折旋俯仰處承當開口道著動步踏著六根門頭一道神光晝夜未曾間歇這箇喚作生死根本業識癡團急須斬作三段又不得聽人道從無住本立一切法本來無有山河大地明暗色空無佛無祖無衆生無凡無聖無善無惡無去無來無生無死這箇喚作豁達空撥因果莽莽蕩蕩招殃禍又不得聽人道坐斷主人翁不落第二見著衣喫飯不借他力山是山水是水僧是僧俗是俗是法住法位世間相常住似則也似是則未是如上所說並是自作障礙自生退屈自棄自暴自殘自虐醫不得底偏僻之病除是下一服換骨靈丹出得一身白汗然後即知傷寒傷熱傷饑傷飽盡是大休大歇大安樂田地與夫轉八萬四千毛病為八萬四千陀羅尼門是身是病是草是藥亦能殺一切人亦能活一切人臨時加減對證修方一切在我若是根本不牢元氣不足莫教被人下一粒巴豆便見通身發作面黑眼花一時性命都討不見若是識安危知休咎底漢但是醍醐毒藥與你對面一翻翻却於一毫頭別有通霄活路如今都是口耳傳習訛謬方書並不見一人有神聖功巧之妙誤人多矣往往指見聞覺知揚眉瞬目為自己復引即心即佛與目前說法聽法一段歷歷孤明之語為證然後舉是風動是幡動不是風動不是幡動却喚這箇作初機公案教你向這裡淘澄見地剔抉根源然後又舉柏樹子麻三斤乾屎橛之類喚作單頭淺近公案教你開口處識取話頭然後又舉玄沙未徹趙州勘婆之類喚作試金石子又喚作換眼睛烏豆然後又舉百丈野狐女子出定之類喚作宗門關鍵羅龍打鳳底鉗鎚然後又舉馬祖一喝岩頭末後句之類喚作向上爪牙衲僧巴鼻以至從上老凍膿一時垂慈利物之要莫不盡有印板上脫來底樣子教你從頭穿鑿從頭注解合著這箇樣子便喚作明大法透古今殊不知幸然自是一箇淨潔琉璃瓶子無端傾許多狼狼籍籍在裏了也抑不知從上若佛若祖與夫盡天下老和尚只是共一箇舌頭有時用一機千機萬機齊副有時道一句千句萬句合轍有時指千句萬句只是一機有時提千機萬機只是一句直得搖乾蕩坤蓋天遮地如擊石火似閃電光搆得搆不得未免喪身失命那裡有你取意觀瞻將心湊泊底分又那裏似世間村秀才教小學自上大人讀到論語孟子毛詩周易一般若如是又何用九年面壁立雪齊腰只麼傳將去學將去便休將知箇事是出世間法須具出世間眼器量一肩擔取始得若只逐旋扭揑逐旋摶量逐旋分別謂之以情意識測度如來不思議大圓覺海如取螢火燒須彌山終不能著縱饒築得一肚皮殘羮餿飯還有一點用得也無還瞞得一切人也無縱饒瞞得他人還瞞得自己也無縱饒瞞得自己還瞞得燈籠露柱也無既瞞不得未免被森羅萬象在冷地笑你在只如欽上座今夜恁麼口嘮舌沸說七道八且道還出得這一笑也無若謂出不得未免亦是西天九十六種之數若謂出得其奈有傍觀眼在且道傍觀眼在什麼處夜深久立伏惟珍重入室後普說兄弟且在這裡聚首片時待為你扭揑鼻孔劈拆太虗一上雖是好肉剜瘡畢竟刀子是鐵你還知一句中具三玄一玄中具三要麼又還知賓中有主主中有賓有時全賓是主有時全主是賓麼又還知殺中有活活中有殺有時全殺是活有時全活是殺麼又還知開口不在舌上麼又還知一手擡一手搦麼若也於此明辨不下緇素不行未免見人道是便道是道非便道非正謂矮子看戲隨人上下安知青布幕內元來有人這箇說話莫道你未有田地底人摸索不著只是參道者禪著青布衫漢十箇五雙渾崙吞棗更莫說用意識摶量口耳沿習之輩隨語生解逐句穿鑿定矣須知道此逸格絶塵之妙不得思量擬議不涉見聞覺知又須知道人人具足箇箇圓成只為無量劫來為生死飄蕩無明業識蒙蔽不得現前不得受用如今要得向威音王以前一翻翻轉須是信道這一著子真箇是我本有之物決定不從人得然後盡父母所生之體天地所稟之氣併作一口吹毛利劒將自己一條窮性命斬作兩段揚在萬仞懸崖之下直得森羅萬象徹底平沉方謂之心空及第海印發光苟或外此直饒參得一肚皮築得一布袋臘月三十日未免手忙腳亂如落湯螃蟹某在無準癡絶會下時有箇朋友每每有一言半句膾炙人口於古人傍敲暗打處亦自盡知落著只是不曾做蒲團上自己工夫後來曾在諸方做藏主氣高行輩一日因打數頭間官司搆架不徹為他人所勝因此氣嘔血致一疾弗救於臨終時直得千生萬受求死不得死每見朋友來問疾便道我參禪平生不曾做蒲團上工夫不信有悟門只在冊子上著到將謂佛祖之道止於此矣今日到這裡一點也用不著勸你輩參禪莫如我一般須是做靠實工夫始得說了又眼淚下這箇便是不信有悟門底樣子死不知去處生不知來處所謂生死事大無常迅速轉眼便是來生忽然一息不來前路茫茫不知何往撞入驢胎馬腹中總不見得你輩初機晚進何不趂身強力健打教徹去這裏孤峰絶頂爐韛之所叢林溫暖百事現成香積供養殊勝若不向這裡打教徹去可謂孤負佛祖孤負檀信孤負師友孤負自己一朝不恰好打箇手蹉腳跌自己若不明白粒米莖虀悉用牽犁拽杷償他始得豈不見夏間許多亡僧各各燒作一堆灰送在三塔裏了如今在甚處安身立命還知麼若也不知豈不是死不知去處謂之死大即今眼眨眨地在這裡問箇父母未生前面目開口不得豈不是生不知來處謂之生大灼然生死事大須是把當一件無大至大底大事竪起生鐵脊梁討教明白始得十二時中莫雜用心莫只悠悠漾漾虗度時光須是打教成一片始得須是這一念子無絲毫間斷始得古者尚道看經看教是雜用心何況你白日起來只了逐東逐西七上八下為人事役役者哉古者又道參禪學道是雜用心參禪學道既是雜用心却教你向那裡用心喝一喝含元殿裡何須更問長安自是你一念馳求不歇棄了現成活計却欲登天入地別討生涯別求佛法所以做盡伎倆受盡辛勤轉加顛倒若能直下頓歇馳求一念則萬法當體寂滅萬法依舊熾然行也得坐也得著衣喫飯不是別人山青水緑夜暗晝明昏沉散亂生死涅槃總是自家縱橫遊戲得大自在法門無一法可棄無一法可取佛與衆生俱是假名殊無實義雖然你又須是己眼自開冷地一笑知道元在自己屋舍中當軒大坐始得若只逐旋扶籬摸壁傍人門戶又是認驢鞍橋作阿爺下頷則沒交涉矣如適來為兄弟舉話有一人半人開口不識語路踏步不知高低要登主人堂入主人室也恐未得在如今大事為你不得小事各自知當彼此不須敗闕牌且納還上方僧問少林首傳二祖五葉芬芳葱嶺單提隻履千燈續焰門庭雖有五家般若同歸地位如何是五家宗旨答云有口只堪喫飯進云若不借問怎達本源答云未敢相許進云如何是溈仰宗答云父慈子孝進云如何是臨濟宗答云迅雷不及掩耳進云如何是曹洞宗答云三更不借夜明簾進云如何是雲門宗答云體露金風進云如何是法眼宗答云山自青水自緑進云五家宗派蒙師指向上宗乘事若何答云頭頂天腳踏地進云今日座元禪師為衆普說還有為人處也無答云你面皮厚多少進云但得雪消去自然春到來禮拜歸衆師乃竪起拂子云這一隊太平奸賊割據一統乾坤有殃害平人之惡被拂子一時擒下縛作一束號令在這裡了也還見麼若也未見待與從頭點過以拂子擊一下三玄三要又擊一下五位君臣又擊一下一鏃破三關分明箭後路又擊一下三界惟心萬法惟識又擊一下絲來線去明暗相投既是贓證一一分明如今却作麼生結絶連擊兩下乃云佛法無人說雖慧不能了只如諸方老宿匡徒領衆三百五百一千浩浩地擊動牛皮鼓擺動牛尾巴又豈是無說又如盡大地人著衣免寒喫飯免饑更要了箇什麼又何待你板頭下一箇黃面漢子攙匙亂筯搖唇鼓舌作什麼雖然你畢竟喚什麼作佛又喚什麼作法了與不了又作麼生忽若有箇生鐵鑄就底漢捩轉面皮喝散大衆掀倒禪床豈不慶快平生話行天下若是邯鄲學唐步放過也恐未得在有麼有麼現前諸尊上既是袖裡藏鋒冷觀敗闕莫怪向淨潔地上撮些子沙土撒在你後生晚進眼裏去也山河大地明暗色空豈不是佛是法風動塵起鴉鳴鵲噪豈不是佛是法四時代謝萬物榮枯天晴日頭出雨落地下濕豈不是佛是法以至真如般若菩提涅槃無明煩惱妄想顛倒行住坐臥折旋俯仰豈不是佛是法這箇是諸方叢林中學得底家常茶飯有什麼交涉既無交涉又莫是泥龕塑像黃卷赤軸是佛是法麼又莫是即心非心亦有亦無半合半開是佛是法麼又莫是麻三斤乾屎橛庭前柏樹子是佛是法麼又莫是觀世音將錢買胡餅放下手元來是饅頭蝦䗫𨁝跳上天蚯蚓驀過東海是佛是法麼又莫是盡一千七百則主賓互換生殺之機與一大藏五時八教權實之旨是佛是法麼這箇又是諸方老凍膿嘔出底野狐涎唾又有什麼交涉既無交涉又莫是即今口吧吧地與眼眨眨地是佛是法麼這箇喚作鼓無明袋弄粥飯氣沒交涉中更沒交涉既無交涉畢竟佛法二字却教甚麼人說又教甚麼處了喝一喝若是師子便合翻身韓獹一任逐塊所以道赤肉團上壁立萬仞只此靈鋒阿誰敢擬亦能殺人亦能活人奴呼菩薩婢視聲聞釋迦老子只好提瓶挈水達磨大師洗腳也未有分據生死海為大解脫遊戲之場滅佛祖燈如彼夢幻空花之影無去無來無得無失無古無今無他無自空牢牢活潑潑淨倮倮赤灑灑沒可把明明向你道沒可把因什麼十箇五雙動是扶籬摸壁無自由分又如駝一箇漢子在肩上立地了行一步子也放手腳不得你若恁麼地便有駝起不駝起時一動一靜未免將自己日用打作兩橛要見寤寐一如生死無間不可得矣十二時中便未免有一半佛法一半世法互相取捨無有是處又於聲色堆裡逆順門頭有箇聞底見底有箇是底非底又有箇不聞不見不是不非底夾截自己受用之地要打成一片不可得矣只這打成一片底說話往往多是錯會了也將謂面前有一物在這裡教你著功用力了打成一片殊不知你但忘知忘覺絶見絶聞自然成一片矣却就這裡縱橫遊戲七出八沒發大機顯大用則從上若佛若祖與盡大地人赤窮性命總在這漫天網子裡了也有時把定教你住也得有時放行教你去也得有時教你生也得有時教你死也得有時向你道是道非也得有時向你道有道無也得以至脫間漏架換斗移星指南作北總不離這一著子你如今不到這田地蓋謂是你情生智隔想變體殊棄了自己成現潑天活業却欲向見聞聲色之內僉疆立界自狹自小稍有越界侵疆便見契券不明作主不得從上若佛若祖與父翁代相承底蓋古今天地榛荒草穢是謂可憐憫者欽上