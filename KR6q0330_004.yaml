body:
  text: 法語示平川履侍者從上來事是擊石火閃電光那容眨眼又如大圓寶鏡纔墮纖塵便成瑕翳苟不能於明闇未逗形名未立以前掃踪滅影要透向上關太遠在目前有見為有所奪目前無見為無所礙只遮有無二字盡天下老和尚與從上佛祖要且盡力透不過既透不過畢竟十二時中合作麼生昏沉不好散亂猶乖識得起處滅處和座盤一時翻轉元來饑即喫飯困即打眠若曰一條白練去古廟香爐去冷湫湫地去三十烏藤未有喫分在趙州突出庭前老栢雲門颺下一橛乾屎洞山折稱稱麻暴露釋迦老漢合與拔舌犁耕然雖如是且道與入門棒劈面喝相去多少荷盡已無擎雨葢菊殘猶有傲霜枝語默動靜俯仰折旋要須如香象渡河截流而過纔有絲毫繫絆便是脚下紅線不斷借使隔江招手橫趨望見殺竿回去已是跳他圈子不出又況握節當胸嚥他野狐涎唾者哉當今名字參學如稻麻竹葦求一人半人向萬仞崖頭獨立如地底尋天雖然如是俊底與鈍底各自根器不同與夫三搭不回何似一撥便轉我宗無語句亦無一法與人古人與麼說話可謂唇不覆齒南閻浮提一般天地一般日月那一箇兩脚不在肚下無端平地強生節目疑誤人家男女過亦甚矣山青水綠雨過雲行盡是顯發自己秘密寶藏時節若欲認箇見聞知覺又是特地當頭蹉過到手便用信脚便行纔涉遲回則成剩法且道離却見聞覺知如何受用劄平田內淺艸裏撞著一箇半箇便好踏在艸鞋跟底莫教被伊露出爪牙便見喪身失命臨濟被黃蘗三頓痛棒雲門被睦州一拶脚折便是樣子苟或不然安得兒孫徧地道無南北弘之在人事無難易斷之在我是與不是一刀兩段便是鐵壁銀山也須粉碎八穴七穿可謂自由外此以往吾不知所謂本色道流也規上人僧問狗子還有佛性也無趙州道無九十六種妙相已是覿面相呈了也要須向未舉以前見得方始眼眼相照若曰死在句下劒去久矣只遮一箇無字便是斷命根的刀子開差別的鑰匙若謂果有與麼事又是節外生枝翻成露布要得親切只消道箇狗子還有佛性也無無趙州古佛眼光爍破天下觀其道箇無字瞎却了也今時師僧須是會得開口不在舌頭上方許伊識得遮般病痛自其兩脚梢空未免扶籬摸壁趙州露刃劒寒光生𦦨𦦨被白雲老漢破心肝五臟冷眼看來大似隔壁猜謎只如道箇更擬問如何分身作兩段未免傷鋒犯手妙喜道不是有無之無亦非真無之無到遮裏畢竟是箇甚裏英靈漢自合一撥便轉若是三搭不回一任你自去冷地東無西無淨和尚道只箇無字鐵掃掃不得處命掃忽然掃破太虗空萬別千差盡豁通是則固是只是未免誤賺後昆瞎將來眼殊不知我王庫內無如是刀山僧每每愛向兄弟道盡三百六十骨節八萬四千毛竅屏作一箇無字一提提取葢為你被昏散二風所欥未免且作死馬醫須是得性命一往直前方見趙州本來面目且道與自己相去多少只遮無字古人謂繫驢橛子要爾十二時中置之一處無事不辦忽若見盡情忘和座盤一時翻却趙州老漢在爾脚底一大藏教與一千七百段陳爛葛藤向一箇無字下透得如刀劈竹迎刃而解若曰逐旋扭揑逐旋合會便有箇是便有箇非有處透得有處透不得要使明如皓月廓若太虗三生六十劫縱使你得箇無字分曉趙州又對遮僧道有畢竟作麼生自古自今十箇有五雙未免平地喫交雪巖莫別有箇道處麼演上人道本一貫用該萬殊去留無跡如走盤之珠達夫是者方知從上一千七百野狐涎涕只是一箇狗子還有佛性也無無却須一咬百雜碎始得忽若崖崩石裂謂之客塵蹔歇急須轉身只守住未免提起便有放下便無十二時中依舊截作兩橛生死與寤寐不能歸一要透遮重關子須是和座翻却往往多是將古人直截太殺老婆心切處曲作奇特玄妙差別商量認羊屎作鹹豉非但自己不知香臭又却度與他人含吐我幸是箇喫粥飯漢莫被此等穢污撥草瞻風貴要頂門具眼若只橫在兩點眉毛之下未免為世情所轉非獨入他作家爐韛上他鉗鎚受他枯淡不得動則青黃豆麥不分所謂打頭不遇翻成骨董可不慎諸示志月上人佛祖是妄禪道是誑參是馳求坐是執縛迷是不知悟是幻覺莫不皆由一念清淨法身佛照了諸相昏是根散是塵昏即體散即用當昏無散當散無昏昏散二岐不相為礙亦不相雜如百千鏡燈只是一燈百千水月只是一月華亭志月上座無端水中捉月一帆二千里直透集雲逗到龍淵亭畔水底觀天方知不是真月如今竪起生鐵脊梁直要打教透徹忽被昏散二魔晝夜交相擾擾脫離無由雪巖向道但只百尺竿頭倒退更倒退定是摸著當空明月演上人歸江陵出無準癡絕語無準先師癡絕和尚明訓昭昭實天下衲子古今師法雖然世尊不出世老胡不西來鷲嶺未嘗拈花少林未嘗面壁迦葉未嘗破顏神光未嘗立雪若曰千燈續𦦨五葉聯芳正是接響乘虗狂狗趂塊更曰我坐地待你究取立地待你搆取豈不是起模畫樣徒自疲勞德山臨濟一人行棒一人行喝總是尿床鬼子四時運之雷霆震之風雨潤之變萬化於其間而物物各適其宜此特自然而然不期然而然也本自非遠近何有之見之一字亦是眼中著屑演上人生緣西蜀古宿所鍾之地出非凡材一夏相聚凜凜然如傲霜青松令人可敬袖紙併二語見示炷香伏讀如在侍傍復進曰茲欲往江陵訪道舊丐一語為塗中受用涼風蕭蕭黃葉飄飄去路遙遙外此無他祝示清妙上人佛祖無上妙道忘是非無得失離學解絕功勳但有脩有證有覺有觸有見有知總是濁垢過患邊事忽爾天崩地陷豁開萬劫迷雲親見本來面目也只是蹔時岐路喚作敲門瓦子不是家珍縱使孤迥迥絕承當赤灑灑沒可把正是貼肉衫汗急須脫下若不脫下十二時中未免被伊籠著不得自由寤寐不得一如明闇依前有間直饒向佛祖未名眹兆未分世界未立以前瞎却頂門正眼亦未有少分相應在當知佛法如四大海水轉入轉深若只在岸邊插脚那裏更在那裏清妙禪人棄官為僧自閩浙至集雲多扣尊宿一日忽到方丈吐露因由老僧未免只在鼻孔裏冷笑仰山門下無禪無道無佛無祖只是一味清水白米苦菜麤羮若要親見雪巖更買三千緉艸鞋行脚猶隔須彌山在示資聖成長老隔江招手橫趨望見剎竿回去已是埋沒己靈更說燒却禪板踢倒淨瓶蝦跳何嘗出斗若是生知風骨逸格道流日月之明未足喻其智雷電之疾未足擬其機直下如大風輪如大火聚三世佛退身有分六代祖近傍無由得皮得髓傳法傳衣總是鉢盂安柄示貴上人狗子還有佛性也無只遮無字是三玄三要之戈甲四賓四主之㗋衿只貴當人拈著便行搆得便去絲毫擬議平地鐵圍自非𢬵得性命不顧生死一往直前安有打破牢關時節太原聞畫角靈雲見桃花便學無字不遠若曰只麼翫水觀山游州獵縣要見老趙州本地風光三生六十劫貴兄道友九夏相從一辭不妄開得一片畬下得一籮粟於三寸蒲團之上收其功矣敢問趙州一箇無字畢竟教放在什麼處試道看賢藏主賢藏主己巳之夏末為余掌東輪於集雲峯下一年四壁如無也信乎本色抱道深牧之士犁杷空人牛忘又安知有所謂苗稼之可侵者也是雖五千四十八卷即斷貫索無影鞭亦置之於無用之地矣退欄以來又經三載動靜之間終始如一壬申仲秋忽袖紙乞語為別且欲循環禮祖以酬素志予曰未出門時行盡天下何祖之不禮也賢即抽坐具一摵觸禮三拜而出余故不復贅之時窓雨戰芭蕉天風撼庭竹泚筆於卍字堂之西軒潤侍者游嶽入門便棒跨門便喝德山與臨濟大師已是夾糠炊米帶土鎔金若論闕齒胡未離西天風月太遠在自餘吹起布毛索犀牛扇豈不誤賺後昆瞎將來眼所以仰山遮裏不敢妄動一絲毫子只貴當人直下不離本際立地成佛庶亦不辜汝在老僧面前叉手合掌送客迎賓而亦翫水游山左之右之如珠在盤不撥自轉忽若有箇不近人情漢拈起拄杖道你有拄杖與你拄杖你無拄杖奪你拄杖又作麼生瀟湘江底月南嶽嶺頭雲初知客入浙太初未判眹兆未分以前豁開正眼三世佛祖齊立下風便可回天關轉地軸辨龍蛇擒虎兕客來須看賊來須打至於不近人情處勦斷從上佛祖命根與大地眾生為冤為對山青水綠噪鴉鳴顯揚自己家風斬新別行條令豈不是大丈夫事業者哉肇翁紹初知客以三應入賓司勘驗方來怪用醍醐毒藥四載游從始終只如一日涼飈襲衣忽起凌霄之興集雲峯雖欲留之拄杖子已在門外前塗撞著惡抵家切忌探水一侍者下浙向上機末後句奔流度刃疾𦦨過風眨得眼來已是千里萬里沒交涉縱使懷域中日月負量外乾坤亦未可幾其萬一臨濟燒黃蘗禪板洛浦淹殺誰家甕中祖禰不了殃及後人德一侍者相從數載大有可憎臨別需語恰值拄杖不在覿面一拳且待歸來分付覺源藏主覺源浩渺性海無邊自非如長鯨巨鯤一吸到底露出珊瑚枝枝撐著月在在處處盡是照乘明珠直得大地眾生潑天富貴然後會百川細流復歸溟渤發為波濤散為雨露運載舟檝發生萬物可得擬議於其間哉若曰持杯以酌執竿以探非徒不知其量深與淺特亦未免望洋而返至於窮死生味今古莫知其涯涘矣義濟上人學道別無方便只貴心堅石穿若是打頭不遇作家未免翻成懵董僧問趙州狗子還有佛性也無州云無只遮箇無字便是剖牢關斷生死破疑團的利刃却須將一箇無字放在額角上如一座須彌山向萬仞崖前獨足而立莫教失脚和自家性命一時粉碎便見斬新日月特地乾坤三世佛歷代祖呼來喝去盡皆在我若是今日三明日四東邊尋西邊覔被箇靜與閙昏與散截作兩段忽覺時蹔輕安轉身又却不爾只為下手不力似信不信流入半青半黃落索羣隊中去也義濟上人山中度夏逢秋問歸矻矻然于眾宛有百丈之作恰與老黃梅同鄉前塗忽有人問梅黃也未不得蹉口祗對鈍置老僧臨風聽得定與三十拄杖德勝上人德勝上人東林上足老雪翁之孫也天姿粹美淡靜而端嚴寬和而軒豁與蒲團為讐敵朝暮未嘗放捨更能握起吹毛劒佛來也斬祖來也斬則昬沉散亂自然倒退三千里忽地兩手俱空直得森羅萬象徹底平沈便是到家時節若問如何是吹毛劒珊瑚枝枝撐著月正勤上人所守者正所學者勤惟勤與正乃入道之捷徑正勤上人能力守之力學之吾當與汝保任摟出趙州心髓將一箇無字颺在萬仞無涯深坑之下却與從上佛祖把手同行不為差事志月上人一月普現一切水一切水月一月攝此喻一心生萬法萬法生一心此即夢幻空華半似而半空者也忽若浮雲蔽空水底清光何在遮裏豁開正眼月未嘗無光未嘗沒明與暗一如死與生無間若夫靈山話曹溪指馬祖翫總是影子邊事志月上人堅志慕道當於天地未判父母未生以前識取真月然後見月休觀指歸家罷問程百千佛祖盡是弄光影漢縛作一束浸在萬丈寒潭之底不為分外德溥上人溥修其德溥學其道人之道德身之黼藻道照今古秋月輝輝德藹乾坤春風浩浩精學與精脩未宜輕放倒九夏不出門亦不踏橫艸忽然拶透趙州狗子佛性無珊瑚枝頭紅日杲杲繼逮上人佛祖之道廓若太虗浩若大海豈造次凡流之可語哉又豈尺寸之可度麻葦之可測哉除非大根大器大力量發大勇猛於一念未生一漚未發一踏到底然後向佛祖頭上坐頭上臥則方有少分相應僧問趙州狗子還有佛性也無州云無只遮箇無字量納太虗深過大海乃從上百千佛祖命脉大地眾生眼目豈可以驢鳴犬吠有情無情見及有思惟心之可測度哉繼逮上人篤志此道究明狗子佛性無話甚切如到方丈請益遭痛棒打出者屢矣一日復來呈偈求語為警䇿故直書此以示若認著一箇元字脚便是雜毒入心孤負趙州不少慈琇上人古人三十年履踐箇事尚道我正閙在如今未曾拈起蒲團便要一鍬掘井豈不天地遼邈者哉昏沉散亂自曠大劫相隨相逐直至今日不有劈太華之力吸滄溟之量掛鐵面具握金剛劒要宇宙廓清難矣雖然白飯元來是米做俯仰折旋著衣喫飯如壯士屈申不借他力廣額屠兒放下屠刀道我是千佛一數且喜一念相應夫如向外馳求弗自投吳與楚豈不重為歎惜智俊上人大根大智俊爽之士當出古今羅網掀翻生死窠臼不滯有無名相不分明闇路岐展拓乾坤於毛髮之上呵叱風雷於謦欬之頃百千佛祖窺覰無門大地眾生仰望不及時節到來則頂天立地播揚大教扶持末法以壽無上法王慧命豈不慶快平生也歟否則未免唐喪光陰虗消信施只是一箇下板頭喫死飯漢聞三下板坐禪一似生冤家一味抽了被寮舍中打睡名字行脚烏足語哉宗然上人儒釋無二道聖凡無二心但得其心道則盡矣在彼在此曾何間焉宗然上人棄六經而收六賊單提金剛寶劒斷盡煩惱根塵一日留紙於雪巖之下欲請語為終身道伴古謂獨行無伴侶語則剩矣但只要不離此不著彼翻身一擲驀過太虗黃面漢與老仲尼目即在上座脚底宗胄上人趙州道一箇無字如擊塗毒鼓聞者皆喪苟不具頂門正眼切忌動著動著即瞎透得一箇無字千句萬句只是一字只遮一字從來不曾著畫也是病見空花趙州露刃劒寒光霜燄𦦨向遮提持得去百千佛祖命根一時兩斷苟或柄欛之真已是自傷己命九河辯藏主大辯若訥大巧若拙此法離言語不立文字之至要也僧問趙州狗子還有佛性也無趙州道無正是巧盡拙出後來五祖演和尚頌云趙州露刃劒寒霜光𦦨𦦨更擬問如何分身作兩段朴散淳離轉而訛之化為糟粕矣吁惜哉九為君數十為成數河出圖洛出書伏羲未畫總未有遮箇消息老趙州著脚於天地未形佛祖未興以前淨如明鏡轉若圓珠僧問狗子還有佛性也無向他道無又僧問狗子還有佛性也無向他道有正如急水打毬子落處不停誰解看勦虗妄之賊絕散亂之媒苟不力提利刃吾未見其然也只遮無字便是直入百萬軍中斬顏良的柄是須先𢬵得自家性命然後有必取必勝之功苟或漸疑漸慮半後半前非獨手中器械被人奪却要見六戶風清一塵不擾未得在頂門正眼肘後靈符鑑地輝天摧邪顯正至靈至驗至妙至圓無出一箇無字向未舉以前一提提得萬別千差同歸一揆如一月印千江月無分照之心水無受月之意千江同一月一月共千江其如情見未忘一任水中撈月如來祕密寶藏佛祖向上牢關透得一箇無字百匝千重一時了畢譬如一燈洞耀百千明鏡交輝却須當軒撲滅明闇俱忘道有道無臨機在我我相亦空萬象森羅同成正覺到與麼時方見古人道盡大地是沙門一隻眼無邊剎海自他不隔於毫端十世古今終始不離於當念僧問趙州狗子還有佛性也無州云無三百六十骨節八萬四千毛竅無明業識煩惱般若真如解脫盡底一傾傾出將謂是一顆照夜明珠誰知却是換眼睛烏豆除非一拶粉碎未易隔壁摶量一處通千處萬處一時通一處透千處萬處一時透五千四十八張故紙一千七百段葛藤會得一箇無字如金翅王一拍四大海水連底俱空纔涉思量擬議便被情識意路絆在荊棘林中要得脫體無依乾坤獨露三生六十劫佛病祖病色身法身寒病熱病大黃巴豆醫不得底病單單提一箇無字向未開口以前一嚥嚥下便是一粒換骨靈丹瀉下通身雜毒百千毛竅俱開五蘊六塵廓若太虗淨如明鏡却與七百甲子老禪和把手同行同坐于大休大歇大安樂田地豈不慶快也歟服藥不如忌口開鑿人天眼目發明佛祖宗猷萬別千差之要七縱八橫之妙無出一箇無字臨機但無揀擇大用自然現前如行空之月無不應之輝若走盤之珠無可留之影或舒或卷或擒或縱剔起眉毛已是千里萬里沒交涉惟大智洞明小根小器可得而語哉俊衲子要如良驥奔騰直須一日千里苟獵虗言不耕實效縱抱天馬龍駒之質未免且困鹽車之下光陰似箭日月如梭可不自鞭自筞者哉了智上人毀冕裂冠披緇披褐古未嘗無枯此心如朽木視身世如浮漚在今罕有所以道學道乃大丈夫事業非將相之所能了智上人棄官圓頂刻苦下工志實可尚但勇猛精進四箇字著力未專為昏沉散亂所困未免墮在悠悠漾漾名字坐禪甲裏只成箇長行粥飯僧去也如今要急相應但只竪起生鐵脊梁撐開兩眼盡三百六十骨節八萬四千毛竅屏作一箇無字一提提起如一團熱鐵如一堆烈𦦨相似則自然空勞勞地虗豁豁地何緣有一毫昏沉散亂之相可得如此五七日去忽然築著磕著也不定本色道人若不赤體親見父母未生以前本地風光只在無邊無岸生死海裏浮沉良為可惜然雖如是直須師子翻身切忌韓獹逐塊法海上人法海汪洋靈源湛寂此大地眾生三世佛祖同一受用只因迷悟二字有差有別遂有生死涅槃輪迴解脫之間要得會而歸之只消單單地猛著精采提一箇無字晝三夜三𢬵死𢬵生與之𤺊捱忽然一踏踏翻徹法源底則見三世如來與三界二十五有通是妙明真覺無生死可厭解脫可求菩提可得涅槃可證如日月自行江河自注乾坤自立虗空自在曾何一纖塵一毫髮之有間哉依舊行但行坐但坐瞌睡打眠著衣喫飯一切平常等閑道著一箇佛字三年漱口法海禪人與了智上座同一出處同住同參發明大事老僧當立待汝未跨門來已與三十拄杖示轉菴圓上人轉山河大地歸自己則易轉自己歸山河大地則難有人道得不難不易句其奈鼻孔已被燈籠露柱穿却未免轉身無路正恁麼時畢竟喚什麼作山河大地又喚什麼作自己自己與山河大地是一是二是有是無到遮裏却須剔起眉毛於十二時中行來坐去冷地自家微細揣摩披剝始得忽若翻轉手摸著舊時鼻孔依前只在面皮上便見五祖道任運不知名輕輕著眼聽水上青青綠原來是浮萍示選副寺道在日用日用而不知所以道知是妄覺不知是無記到遮裏且道知底是不知底是從上老凍膿與天下行脚漢並是築破飯袋踏破艸鞋要且未見一人透得遮重關子既透不過不若行但行坐但坐折旋俯仰不是他人至於聞聲見色送去迎來左東右西無適不在是則固是其奈己眼未開被一重膜子障住未免前段葛藤盡是別人家裏事於我全無交涉須是十二時中四威儀內無絲毫虗棄底工夫單單提著一箇無字竪起生鐵脊梁如頂一座須彌山在額角頭相似莫教眨眼照顧不前便見渾身粉碎且喜一生參學事畢選副寺淳厚有素久依東叟老師今欲換水養魚向萬丈寒淵深處插足忽若老龍奮迅巨浪潑天切不得於乾地浸殺趙州見南泉臨濟扣黃蘗龍潭接德嶠盡皆一踏到底當此末法氣運澆漓盡非一拶一挨便透根器自非得性命向萬仞崖頭一撲欲空萬法根源以盡不傳之祕未之聞也昬沉掉舉之根起於業識顛倒之頃今欲而斬之非力坐死究則不能勝矣固曰行亦禪坐亦禪語默動靜體安然此亦得底人田地若是未得底人謂之執藥成病安有海印發光時節決欲究此一件大事當須發大勇猛奮不顧身盡此三百六十骨節八萬四千毛竅屏作一箇無字一提提起頓在七尺單前三寸蒲團之上如一座須彌山相似兼以晝夜積以歲月無有不透底道理若只半熱半寒似進不進欲圖速効以資話柄將恐後來打入骨董隊裏去也忽爾目前虗豁豁地似覺不見有此身正謂之豁達空撥因果須是信一念子啐地斷嚗地折如崖崩石裂地陷天崩始得未曾親到遮箇田地謾說大悟十七八番也是傍若無人本分工夫須是十二時中打成一片無絲毫間斷始得若曰進一寸退一尺一日暴之十日寒之安得有成辦底時節是須竪起生鐵脊梁教節節相拄盡八萬四千毛竅三百六十骨節與平生氣力屏作一箇無字一提提起如一人與萬人敵始得稍涉遲回則被昬散二風縛作一團定矣從上千差萬別正眼若開只是一句不消欬𠻳一聲一時透畢如今有一等不唧𠺕漢往往多是將實法定相衷私傳授誤了一切人墮在情識坑子裏頭出頭沒剗地到不如三家村裏田厙翁胸次中潔潔淨淨却無許多狼狼藉藉宜審思之參得到說得到又須行得到殊不知俱到也不是俱不到也不是將知我此宗門下事如疾𦦨過風雷霆霹𮦷無你擬議處無你湊泊處除非大根大器大力量聊聞舉著倒轉鎗頭便是黃面老漢也與一刀兩段降此已往三生六十劫三到投子九上洞山至於坐破七箇蒲團與隔江招手一宿曹溪望見剎竿便回往往將謂根有利鈍時有先後殊不知依舊是箇日出東方夜落西雖然如是鄭州出曹門宗仁上人仁為五常之宗心為萬象之主心恕則仁自生心慈則仁自興善惡之性同一源生佛之分無二天從曠大劫至目前著衣喫飯誰不然克俊上人俊道流克明自己十二時中常默默地苟存毫髮不能除便見從前都不是等閑一踏到底忘事亦忘理宗正上人僧問趙州狗子還有佛性也無趙州道無如撾塗毒聞者俱喪又如提金剛寶劒霜𦦨凜然獨脫漢拈得便用拏得便擿七百甲子老禪和未免翻成窠臼妙喜道不是有無之無亦非真無之無與麼說話窠臼上更添窠臼除是等閑一揑和趙州三百六十骨節一時粉碎撒在百艸頭上散為萬別千差逗到結角羅紋處覔一微塵了不可得庭前柏樹子麻三斤乾屎橛一時掃蕩無餘雖然如是萬里不挂片雲青天也須喫棒宗正上人還甘麼縱饒不甘也須一揑粉碎守志上人志懷高遠守亦堅牢斬佛祖劒柄要力操寒霜光𦦨腥血鮮臊眼空大地無英豪關羽一勇非吾曹當機一笑風怒號四海息波濤妙圓首座從上來事本乎無傳宗乎無言如大明當空無幽不燭如太阿在手殺活臨機斷無葛藤露布口傳心授以舛宗風以悞末學若佛若祖不得已方便垂慈失口流落一言半句不然而然偶爾而爾莫非為汝洗蕩情塵破除業識並無纖毫實法與你為知為覺為解為礙如明鏡無塵而加綵繪者哉可笑近代有一種不正因尊宿與一類不正因弟子如學上大人丘乙己至尚書周易一般方可稱為明眼衲子苦也屈哉宗門事業若如此學得佛法不到今日所謂參須實參悟須實悟閻羅大王不怕多語書上吳丞相竊觀吾宗向上一關明如杲日浩若太虗動靜存亡照用機栝如雷如電如風如雲及其翕也纖塵不立及其張也彌亘大千所以生死籠伊不住是非明辯伊不得是謂一味平等無礙大解脫門也然而不可以有心知不可以無心造只貴大力量大丈夫向情識意路一切差別等見未萌以前赤骨律地一跳跳出却領現成受用然而則知昭昭鑑覺與紛紛起滅者是皆大解脫門之正體也鑑覺則覧外塵而成見起滅則逐內妄以成知此知此見直下蕩蕩地如水上葫蘆曾無住著既無住著鑑與覺起與滅塵與妄知與見生與死是與非是皆空中鳥跡就而求之曾何毫髮之有哉三世諸佛本源六代祖師心髓盡不外乎此矣良由大地眾生失業亡家窮劫至今流而不返指親為賊認郎作奴自己庫藏中百千珍寶棄之而他覔外求所以累他先聖脫珍御服著弊垢衣巧設方便引而誘之無他葢欲其信道自己是佛更無別人耳昔有一僧因不自信遂問石霜云起滅不停時如何霜云一條白練去冷湫湫地去古廟裏香爐去又問巖頭頭喝云是誰起滅此二尊宿所謂纔有所重便成窠臼是以活遮僧不得昨聞大丞相國公舉此公案撩撥諸山亦一時盛事也淨慈云同坑無異土強費分疎護國云在丞相分上則神通游戲門外打之遶某亦有一語要為遮僧一刀兩段口未開時分付了也如某者二十年前亦不自信鑽天掘地徧求佛法通宵徹旦惟被起滅昬沉交相擾擾如夙世生冤無由解脫雖時時念念提一箇無字與之𤺊捱終是力不能加又復多尋方冊博探古今亦卒無藥可療忽一日涕流淚下痛自鞭䇿曰從古至今悟道無數豈我獨無夙種乎於是奮不顧身一往直前將三百六十骨節與八萬四千毛竅併做一箇無字一提提起正如一人與萬人敵徑欲直趨中軍帳裏取將軍頭相似曠劫煩惱一時現前只得盡命一揮忽然起滅昬沉頓忘所在身與心人與境渾然一片如銀山鐵壁行也如是坐也如是飲食起居悉皆如是偶一僧問曰你如此癡狂作甚麼對曰辦道又問曰你喚甚麼作道對曰與我說話是道又問你死了燒了又喚甚麼作道遂不能對但只茫茫轉加迷悶竟不覺歸僧堂單位下方始翻身竪起脊梁面壁而坐忽然平白如地陷一般面前豁開一亮正如雲開月朗夜闇燈明森羅萬象法法全彰般若菩提塵塵顯露回思從前醒底困底閙底靜底起底滅底逐色隨聲底至於一切是非得失喜怒哀樂移換底元來盡是現前受用更非他物却憶從前只欲於如上等處盡力掃除就海棄浪良為可笑自此虗蕩蕩地孤迥迥地常露現前更無絲毫動相當時只不合執定此見返為所見所知一礙礙住每於白日虗閑廓忘知見處中夜睡著泯無夢想時打作兩橛剗地又透不過既透不過則生死岸頭便是樣子從上宗門中一言半句萬別千差有意味可以㗖者一一排遣得下無意味難於下口者又却吞吐不得則他日異時何以宏宗樹教於是晝而思夜而詠行而看坐而提如是孜孜兀兀或進或退若存若亡者又閱十載一日在太白五鳳樓前縱步舉首見一株古柏觸著面前向來所得和胸中凝滯盡底脫去如在萬重荊棘叢中一跳出在白日青天之外打一轉相似更無纖毫勾絆所是從前有見無見世出世間了不了法一時消蕩淨盡無餘一千七百則閑家潑具當甚盌脫丘何處更留一絲頭知見解會徤行困坐喫飯著衣只是一箇平常無事人耳今時諸方往往不本元由多只認目前聲色弄箇業識團子接耳交頭商量傳受以當參學古人一時垂慈方便將楷定規模依樣著語批判謂之明大法自己脚根下一片田地依舊黑洞洞不知著落殊不知從上以來正按傍提之要全生全殺之機如大車輪如大火聚拶著便轉觸著便燒那有你擬議親近處縱饒具奔波度刃底眼向三千里外提持亦未可幾其萬一豈宜以實法定相鬬釘苟合誤賺後人瞎將來眼是致佛祖正傳不傳之祕流為世俗口耳之學實證實悟教外之旨指為表顯門庭之說吁惜哉王潛齋竊謂吾釋之道從古以墜非假至尊至貴翼而扶之則或不自立是故迦文誕生兜率示現王宮至於成道轉法輪則曰吾佛法付囑國王大臣為之外護所以廣被西乾遠流東土緜緜二千餘載而未泯者實外護之賜也惟近世以來時當末運宗社澆漓雖王臣外護不減伊昔而聯芳續𦦨大恥先賢夫圓其頂方其袍但知從事乎鄙陋猥屑殊不原夫吾道之始終道也者彌綸乎三界統御乎大千天地日月陰陽造化風雨晦明未始不一一即此道而囊槖之虗而異為聖為賢為愚為蒙為昆蟲為禽獸凝而分為山為嶽為江為海為竹樹為艸菜以至生死興亡遷流代謝是皆根於之道翕張而已矣然則道之為道果何物也即羲畫未著以前之易耳易之為體果何寓也即乾坤未位以前之理耳理之為用果何歸也即萬物未化以前之性耳性之為性蕩蕩乎周行巍巍乎不動亘十世窮十虗而不見其大返一念逆一塵而不見其小以釋而言曰正法眼曰大圓覺曰毗盧印通而變之即趙州柏樹子雲門乾屎橛德山棒臨濟喝卷而為玄關為金鎻舒而為萬別為千差以儒而言曰皇極曰中庸曰大學會而歸之即孔氏之忠恕孟氏之浩然回也愚曾子唯著而為詩書為禮樂列而為三綱為五常由是而觀儒之與釋道之所在固一惟其化異而制不同耳何哉是由釋之教以慈忍為化以戒定為制故夫人也或得玩而視之近而易之儒之教以誠明為化以刑責為制故夫人也崇而尚之仰而畏之仰而畏則懼生焉近而易則慢生焉今夫人也果曰我慢則其逸俗絕塵清冷之士掃蹤滅跡甘與流光俱化曾何世相之有哉故曰不假王臣外護而翼扶之則或不自立果不自立則彼託形借服混淆之輩泛濫法門又安知吾懷袖中確有可崇可尚可仰可畏可懼之道也哉竊謂佛法至要本乎明心心欲洞明貴乎息見見乎不息則邪正交錯心乎不明則真妄交馳苟息矣苟明矣真與妄俱空邪與正不立直下儱儱侗侗顢顢頇頇如三家村裏田舍翁無絲毫知見羅網胸襟無絲毫聲色籠耳目到恁麼處依舊七顛八倒逆順縱橫左之右之無在不在始可謂之心明矣見息矣妄與邪不能干矣正與直不必顧矣更須撥轉向上關棙和底一時翻却申出三頭六臂於無湊泊處別開正眼亦未可稱為本分參學茲者仰荷不鄙以傾蓋一見間示以入道因緣且謂於語默提撕不及處忽然豁爾現前此正妙喜所謂𪹼地斷時消息也有以見台座於脚跟下徹證父母未生以前面目諦且當深且遠矣但又舉昔有一僧稱台座慧有餘而定不足台座亦已甚肯其說然此僧好與三十拄杖何故葢為不曾有本參中事返於淨無瑕纇處添一重翳膜遂誤台座直至于今剔撥不下所以語某曰我被遮一件事礙在胸中久矣以某見之何礙之有但不合當初於豁然現前時一認認著如今於泯然無知處一忘忘却是致明闇交爭是非交奪朕兆未彰以前消息截作兩段不得自由自在殊不知森羅萬象明闇色空煩惱菩提智慧解脫通貫是箇大圓覺海欲覔一絲毫根蒂了不可得既不可得則當知教中道應無所住而生其心心既無住則當會見見之時見猶離見見不能及見既不及則當思豁然現前之時此即敲門瓦子實非堂奧中物急須颺下果能颺下亦不必起颺下之見若起此見其病愈增但只隨機應變任性逍遙或寄觀聽於金石絲竹或全用舍於禮樂詩書至於升降揖讓遊泳推敲莫不盡從此大圓覺中流出更無絲毫外來之物然後佛也心也見也息也邪與正也真與妄也不待區別曉然判於明鏡中矣荊溪吳都運書竊觀聖人之道與如來之道同一道也未甞二也聖人之道則率性如來之道則見性見性則可以明心可以成佛可以度眾生率性則可以正心可以脩身可以治國平天下雖率與見異而性則同也非獨聖人與如來同此一性自曾子子思孟軻以降至于近世伊洛晦菴水心篔𦝰及荊溪安撫都運侍郎正脈綿綿接踵而臻聖人之域莫不同此性也西天唐土三十五祖與德山臨濟至于近代妙喜應菴或下世間有作者而出發揚佛祖不傳之秘於言句之外是亦同此性也此性既同則此道亦同此道既同則百家諸儒之書與五千大藏之文同一舌也是故聖人曰吾道一以貫之如來亦曰十方世界中惟有一乘法然此一乘之法與一貫之道即此性此性即此法此法即此道道也法也性也名異體同其為體也天包無外細入秋毫迎之而不見弃之而常在天地依此而立日月依此而明聖人依此而設教如來依此而示現即儒所謂皇極無極大極釋所謂本地風光本來面目本生父母是也仰惟安撫都運荊溪侍郎當代道學宗主清鎮臺藩政傳中外闢學校明仁義安巨室寬小民實謂盡此正心誠意之道行且力矣以一身為金口木舌化湖湘為洙泗矣獨釋氏之宗索然墜地猶未獲盡此心為此道盟至耳願於正三綱修五常之暇略移一瞬以照釋氏之宗則見聖人之道與如來之道同一揆矣或謂釋氏之宗多迂闊多虗無非迂濶也非虗無也蓋此本來面目本地風光與夫大極皇極浩浩然蕩蕩然不可得而形容不可得而擬議故其立言也多曠達寓理也多幽潛即幽潛以見其妙杲如白晝之明即曠達以見其微端如眉睫之近其理之幽潛言之曠達莫不發越乎此心之中未常隱也故聖人曰以我為隱乎吾無隱乎爾如來亦曰法法不隱藏古今常獨露但此義雖至近至易而非世間聦明利智之所能達是須脫去一切情塵解路至胷中一寸之地廓若太虗之廣則此義洞然明矣而亦便知森羅萬象昆蟲草木即此義喜怒哀樂折旋俯仰即此義此義既明則百家諸儒之書五千大藏之教未抵一箇之字昔李翱相公見藥山以雲在青天水在瓶明此義無盡居士見兜率於夜半觸翻泉鉢證此義山谷道人見晦堂聞桂香符此義無垢狀元見妙喜聽蛙聲契此義與夫從上道學諸巨儒莫不盡與釋氏游而相與握手于至妙至玄之表近世雖無大顛妙喜輩可敬而尚之惟台座揭日月之大明懸古今之至鑑燭於混元未判之先則見聖人之道與如來之道同一揆也明矣荊溪吳都運書竊觀釋氏之道以戒定慧三學為宗戒則律以持心定則靜以照心慧則智以明心有慧無定戒則念念在放逸徒爾事言說而不能斷輪迴脫生死有定無戒慧則念念在虗寂徒爾滯頑空而不能唱大教導羣生有戒無定慧則念念在執捉徒爾拘法度而不能一是非齊物我然而慧即定定即戒戒能生定定即生慧慧也定也戒也祖乎一心心本不有戒定慧復從何得然則不有而有廣若太虗盡大千沙界艸木叢林鳥獸人畜與夫八萬四千塵勞總即此心心不生即戒心不動即定心不昧即慧戒定慧即此心之本具初不待習而後得也有時不有細如毫末應一切真如般若菩提解脫與夫八萬四千行願總非此心心非戒而自止心非定而自息心非慧而自通戒定慧與此心俱無形相雖時時而習之無所得也於無所得處無所不得則得本無得無得之得是為真得其為得也寬廓非外寂寥非內瞻之在前忽焉在後不可取不取捨不可名不可狀此即從上百千佛祖以器傳器以鏡照鏡一段奇特因緣謂之正法眼藏涅槃妙心也是故達磨大師自西天竺國而來始見梁朝武帝問聖義諦中以何為第一達磨奏云廓然無聖又問對朕者誰奏云不識此即達磨為武帝直指此心以有言示無言也帝不契達磨遂折葦渡江徑歸少室峯下面壁屹然而坐此又為盡大地眾生直指此心以無言示有言也歷九載星霜無人領旨惟神光可大師斷一臂禮三拜叉手而立默爾全身擔荷於形名未兆之先是謂達磨西來不立文字直指人心見性成佛自此毒流東土接響承虗可傳燦燦傳信信傳忍忍傳能能即賣柴漢是謂六祖祖下分二傳一曰南嶽讓二曰青原思惟讓接機敏利雷轟電馳散枝派於四方星分碁布源源不絕即南嶽福嚴山是其唱道之地慨夫時移道喪至今幾五七百載而漸至乎絕滅無聞矣雖吾浙全盛之地所在叢林尤多汙雜求其深明此道步步踏實者未之有也信有此道時時步移者亦鮮矣道既不明又不信矣欲望吾佛祖之教復興於此其可得乎粗有志於參學流通之士對此得不為之痛心大息者哉如某者自幼削髮因篤信此道而游方始造淨慈天目之室提狗子無佛性話心心相承念念相續者三載晝以繼夜夜以達旦是必欲剖此念破此心以見父母未生前本來面目忽一日於著力不到處此念此心未萌處泮若氷消豁然迥露如太虗之朗月獨耀于中霄當是時也上不見有諸佛下不見有眾生內不見有自己外不見有山河巍巍堂堂煒煒煌煌惟一清淨無依無欲大解脫境界即前所謂無得之得是為真得其戒定慧亦無處容受戒定慧既無處容受則一切逆順是非好惡長短如太虗之雲於我何有哉爾後即以此扣之靈隱石田參之天童癡絕證之徑山無準洎笑翁大歇北磵石溪莫不盡跨其門而審之然而所見亦各有淺深所用亦各有高下若夫從上佛祖千差萬別隱顯機緣是皆紅爐上一點雪仰惟都運詔使國史寶文荊溪侍郎道學正統得伊周孔孟之正傳廉明仁愛教士養民當世一人耳某宿何厚幸獲遭際於此時實千載一遇也龍興之寵擢道林之改遷眷顧異常實出過外之望四絕堂上獲聆無極之論侍郎謂無極乃此箇道理無窮極也又謂孔孟之說如是伊洛之說又如是晦菴象山之說又如是是以見此箇道理無窮極也然而理既無極事亦無極事本無名因理而得理本無形因事而顯始自天開地闢至於三皇五帝歷代君臣一治一亂一興一亡是事之無極也事不自立因理而顯理即心也天地萬物生我心內治亂興亡自此心中流出故曰事本無名因理而得心即理也即天地萬物四時代謝治亂興亡以見此心是理之無極也故曰理本無形因事而顯事即理也理即事也事與理融是為極也極之為極浩浩蕩蕩杳杳冥冥不可窮不可盡是為無極無極之極是為太極太極乃中也中也者即天地萬物喜怒哀樂未具以前清虗之至理也然此清虗之理含藏天地萬物與夫喜怒哀樂是謂中也其為中也圓同太虗非欠非餘能平高下不墮有無即吾佛氏所謂正法眼藏孟氏所謂浩然之氣孔氏所謂一貫之道以是融會儒之與釋雖門戶不同道之所在只一也序友山序友直友諒友多聞聖人之遺訓也直則開心見誠諒則察往知來多聞非具正遍知之謂歟在古亦曰擇朋須勝己似我不如無取友之道也如此必謙上人之號友山文不在茲乎插天拔地而不倚山之直也風來樹動葉落知秋山之諒也鐘鳴谷應猿啼寉唳非山之多聞也歟今上人取山為友者是三德也蓋德可以益于吾也然山亦靜亦定靜定之間戒慧自足吾今取山為友者豈徒然哉甲申秋之七日上人瓣香幅紙請雪巖老叟序以證之序非所能也姑即此義以理此事直書以遺之云無翁序淨行禪者踐臘雖淺志願極深神凝秋水氣稟辰霜問道于雪巖老叟若將有得焉而又輒以號為問姑即無翁二字扁之亦誘進之一端也能於無字下洞見根源則行不練而成淨不澄而清矣少而稱翁又何礙焉叟復示以偈曰萬法重重一字收拈來頓在鼻尖頭皤然白髮鏡中見覿面何曾有趙州雲山序白雲依依青山巍巍光風浩浩霽月輝輝彷彿善財童子與德雲比丘在別峰相見之時人也境也事也理也今也古也纖塵無間毫髮不移上人有以永德自名雲山自號者飜然而起曰我本無名假永德以自稱我本無號假雲山以自號師肯賜一語為證否曰唯學至於無空萬緣無一塵之可得正善財於七日中間親見老德雲消息豈暫時聞見之可及也哉所以上人自名永德也德既永矣道亦永焉上人之號雲山實也非假也故書一偈以旌之縱目無心與麼看擎天拔地黑漫漫誰知七日不相見只在眉峰一寸間靜山序并偈萬緣不涉萬法自閑此靜之義也靜則定定則安所謂安若太山萬機不能撓矣然靜必有動動必有作作必有言靜山二字由是而得普寂之號由是而稱雪巖一偈亦由是而成偈曰一跡無餘萬籟沈巒光月色共深深誰知尚有𬅿兒閙龍在霜枯木裏吟秋江序并偈秋江智月上人之自號也涼秋月明空江浪平上下一色表裏洞明心也佛也禪也道也名也號也覔一絲毫有相了不可得非上人之見處也歟若只與麼猶是過患邊事姑示一偈云漾漾銀河玉宇流淨如白練冷光浮老胡一葦踏不著零落西風斷岸頭中山序并銘乾坤之內宇宙之間中有一寶祕在形山古人已是覿面相呈何祕之有道寶藏主以中山自號山既立中中則有外中外相承祕可見矣雪巖老叟為銘之曰不倚曰中屹立曰山白雲四座明月一間獨坐天心存正念直透須彌只等閑天全說嗣樗侍者自號天全請說于雪巖老叟曰何義也朽腐不收之木亘千萬劫而不涉春秋無斵削雕刻斧斤之患以殘吾軀無依附寄托棟梁之任以重吾肩抱烟雲而自樂伴苔蘚以閑眠循循焉望望焉夫是者謂之天全予曰否天全乃全其天各各全吾所賦之天利者不鈍愚者不賢直者不曲脆者不堅而又愛者汎獨者專執者方轉者圓或又曰否吾則曰然於是出一偈以美其稱頌其德發其全全之者天廣而無量亦無邊遍覆三千與大千欠闕不存𬅿子相運行當與日同圓銘一溪銘溪清可鑑萬派一源無上妙道唯心可傳道清諱也一溪號之作是銘者雪巖為誰鐵船銘濟今茲巨舟匪木之儔開乾坤鞴模範九州發性天火石爍金流形名未具運載已周不加櫓櫂惟重惟浮博濟四海任其去留一篷明月萬里清秋偈頌送德富藏主之衡集雲雲外小睡虎毛色金斑威百步頂門正眼爍乾坤等閑亦或生風雨拂曉出門去何處衡陽城中訪親故記之早晚即歸來震雷一喝了此末後句送光後堂并序妙光首座兩載游從如一日蓋孜孜于道不知光陰之易也如此俄然需偈為別因筆以餞云春風惡春風惡一夜梅花盡吹落人來話別欲游吳踏斷東南天一角春風惡春風惡八千里外望西川從前都是錯宗正上人金襴之外傳何物應道門前倒剎竿亘古亘今全提句好向聲前著眼看衲僧衣鉢只者是汝今已得正宗旨寄集雲單號別傳枚數英才先屈指忽來告假歸清江窻前梅早春漸芳一枝橫出蒼烟外泉聲噴雪巖流香惠洪上人洪濛既判惠然紅日天地開明即心是佛塵沙剎海遍界發輝一絲毫頭昧之不得却須直下掀飜休為知見所執受用只此平常更無玄妙奇特若是衲僧門下難免痛棒三十目今且贈四藤任便東西南北回首集雲峰面前青突兀送契寧上人道契佛祖身自康寧行篤言寡名香德馨一塵不染千里前程番陽浩浩集雲青青穩泛扁舟短櫂西風浪平紹隆上人行以德紹道以時隆浮薄在彼端確在躬衣單下事還一同道德言行誠明中語默動靜昭日月折旋俯仰生春風上人夏在集雲峰倐起湘江歸興濃庭前索索飄井桐赤肩擔瘦笻真惠上人將謂如來惠戒三昧此語雖真此意未在正似湘江兩半晴岳面不開雲靉靆一日升天四海明杖頭掀轉却頭輕不移跬步到潭城相逢歷歷話前程本來上人本不曾來亦不去百二十日如是住昨夜西風忽轉頭花開闌畔木犀樹收拾行囊話起單集雲東湖來去間雙桂枝頭冷消息却與荷花香一般慶一上人聞訃識得一萬事畢慶快平生是今日佛祖單傳無二心生死洞然空四壁匇匇聞訃來歸不礙獨行特立羣峰疊亂青遠水漾虗碧寥寥天地間來去有何極韶華自轉春無迹了恩典座十二時中承誰恩力俯仰折旋不須外覔著衣喫飯一了便了開眼天明是誰不曉大地沙門隻眼睛丈六金身一莖草志滿上人夫志在謙毋自滿勿以其長跨人短海因有量天亦聾人未有德休恃聦君不見水涸山枯物憔悴春暖風和蝶蜂至欲在叢林立此身學以成其志祖機上人靈妙之機佛祖莫知疾則蹉過遲非所宜靈在自己妙在日用喫著衣一靜一動動靜兩忘波停岳聳元覺上人妙覺明淨元無所覺如鄱陽湖秋波不作亦若匡廬雲平月壑笠頂西風閑去來拄杖頭邊空索索打碎靈龜殻智遠上人智聰則遠機圓自轉似走盤珠如萬花苑開落不在春秋動靜不滯去留雲悠悠水悠悠天外月如鈎雪峰袞出三箇木毬克圓上人克期取證功行已圓湘南潭北一月在天五峰深處萬象皎然相見不須撫背痛與肋下三拳掣風掣顛覺初上人靈覺之初廓然太虗巘雲平岳頂海月照珊瑚描不如畫不如詠不如一段靈光今古無元是兜率橋頭三生藏裏夜明珠道可道者道可道非常道名可名非常名名既非常如器中鍠道既非常如日之光如器中鍠聲出於內如日之光光照無方夫如是乃可稱有道之者非獨善一身而達之萬道從上人惟道是從惟心是宗空即是色色即是空夢幻了了來去匇匇水中之月樹上之風作如是觀無塞不通了明上人了明明了孤光皎皎夜永月寒雲開天曉二淛江山拄杖頭脫略根塵靜悄悄大明當空無幽不照如是行脚行脚事了百煉精金由指而遶智賢上人智者必賢正者不偏平坦性地朗我心天折旋俯仰諸佛現前一光同照萬象樅然本善上人本來面目善自參詳六般神用晝夜放光不須擬議切忌承當風前一陣木犀香金粟花黃行坦上人細行循循大道坦坦得處至要用處至簡從上一千七百人七縱八橫大機大用肩上無過擔片橫版頂門只具一隻正眼譬如斬一握絲一斬俱斬一切盡斬普義上人雲門普趙州無二字一義茄子落蘇提起便會直入聖賢閫域聲前擬議未免者也之乎且聽端的下箇註脚俱如珠上人等閑剔出影團團一一如珠走玉盤風前燦燦寶光寒落落誰從轉處看當隨機括動休被眼睛瞞魚目光生也一般天上蟾蜍水底浴明暗不相干法立上人萬法無根從何而立一念心堅銀山鐵壁發大誓願大解脫幢萬木生秋風自凉庭前一陣桂花香法茂上人野鳥山花能說法茂林脩竹是參徒時常舉一箇心字覿面當機見也無雲埋夜月冰透玉壺明暗雙忘理事一如差乎緣木求魚允寬上人初無允諾寬著程限一似跳黃河盡力要合眼跳過跳不過直要橫擔板南北天高雲淡淡漁歌秋色晚嗣牧上人先以放嗣以牧兩鼻穿四蹄禿有闌圈無拘束山自青水自綠從來饑飽不相干幻泡影中休碌碌單單贏得這題目惠性上人惠性忽通差別無礙七縱八橫得大自在向微塵裏轉渾身影落五湖雲水外問時人會不會明白一句子卞璧無瑕驪珠絕纇傳義上人直指之道義不可傳不立文字昭昭現前萬里不掛片雲一亘白日青天聲前有意句後無言理事雙遣也木頭碌磚如山上人絕毫絕釐如山如岳萬里高飛遙空一鶚見不到處天涯海角智不及處大圓滿覺西風蕭條黃葉落古殿深沈撼金鐸却悔當初賺行脚師亮禪者憶昔西山亮座主曾有虗空解講語喚得回頭是馬師規鑒叢林照千古上人學禪不學教禪教初無二門戶一拳打破太虗空知音不在頻頻舉佛祖讚出山相六年饑餓半夜癡狂貧兒拾得錫赤脚走忙忙觀音鰲翔海運地迥天空一瓶淨水五濁惡風安得眾生界具證圓通其二以耳返觀夜濤傳別谷之聲以眼返聽甘露散垂楊之碧所返既忘觀聽亦寂夫是之謂救苦慈悲願力魚籃婦行步輕盈梳裝濟楚示大慈悲救眾生苦智眼堪憐盡不明只道籃中賣錦鱗其二籃裏清風手頭生活要將魚目換明珠豈是慈悲菩薩有智慧人不消一劄馬郎婦為涇上人贊謾說教人學誦經胸中涇渭甚分明金沙影裏無窮數散作一灘流水聲維摩尫羸面孔蹊蹺肚膓憂愁苦惱詐病在床說離生死妙法一默無雙達磨九年壁觀顯家風半是真誠半脫空一葦不知何處在長江依舊水流東布袋一笑生春風雙瞳湛秋水日月拄杖頭乾坤布袋裏彌勒忽然下生何處尋你臨濟眼生三角頭峭五嶽三遭瞎棒折驢腰一喝當空星斗落錯朝陽穴鼻針無縫襖一綫紅日頭聯得似恰好其二離離披披破骨董補一孔了又一孔三竿紅日透籬邊看來何止七斤重自讚德富藏主請巍巍堂堂煒煒煌煌佩小釋迦懸記身穿御賜衣黃人言有德可富自羞伎倆尋常蕭蕭兩𩯭風霜昭如長老請住木平海印發光昭然如日曾對大元聖主默說不二法門默而說說而默中興大仰叢林天下第一法窟見者是誰石頭古佛智坦西堂請大智洞明大道坦平生鐵面具不近人情雲峯日朗雪谷雷鳴激起曝腮焦尾同躍天庭原妙侍者請高峯上大今已無人雪巖可知禮也虗名塞破乾坤分付原妙侍者嘯巖居士請入錢塘北關祖師會湖山影裏水月光中似我非我朧朧兩眼平生四海空如初禪人請半身身披御賜衣名在江湖上對面忽相呈全全不似像雪白眉毛頷下生仔細看來何止長一丈也是起模畫樣覺圓居士請妙覺圓明離諸聞見纔涉安排雲遮日面若言即此是山僧三尺竹篦如掣電好好看方便濟北之後法席惟東山老祖一瓦鼓歌為絕唱到破沙盆下其聲益宏若夫翻經易訁續音微吾仰山師叔幾至銷歇雖然其間大有節奏在具眼衲僧試自甄別大德戊戌休夏寓雪竇前育王屬姪比丘淨日拜手補遺題䟦題羅漢手軸松風浩浩㵎水潺潺白雲影裡枯木寒巖十八高人行住坐臥神通游戲其間龍耳無聽虎體元班䟦圓覺經大虗圓滿妙覺混融如春化物和而不同力不在東風䟦應菴付密菴法語破沙盆蓋天蓋地是我祖大徹投機句也無若道是未見應菴在若道不是蹉過密菴了也後之學者苟不開正眼未免只喚作破沙盆題坐禪鍼記著一字喚作依模脫自有一條通天大路因甚䟦偃溪語佛照老人倒握妙喜三尺竹篦罵風打雨奔雷掣電激起東㵎波濤翻作偃溪流水自一而三會三而一五髻峯高勢插天雙徑如絃直䟦枯巖頌軸我觀是軸語不滋潤句不新鮮蓋從枯字上發越也而又卓絕無路玲瓏莫窺得非巖乎小佛事清妙侍者火佛祖道妙絕點純清全體全用三喚三應雖然病在心腹依前不墮常情作麼生灰飛煙滅轉見光明介俊侍者火俊哉衲子介然自立三應聲中銀山鐵壁喜識盡髑髏乾烈焰光中珠走盤惟則上座火惟天惟大惟堯則之古今一體生死同歸無氣息絕離微火出木盡煙滅灰飛悟上座入塔悟時悟迷底迷時迷悟底迷悟兩俱忘畢竟是甚底一堆白骨冷如氷萬疊青山翠如樞菴主下火靈樞密運神機顯發豎指豎拳有殺有活八十餘年受用不盡末後抽身生涯轉闊烈焰堆中阿剌剌評論山菴雜錄云仰山雪巖和尚婺州人立志超卓非其人不與交早歲見無準于徑山因鑄鐘令作疏語師成偈云通身只是一張口百煉爐中袞出來斷送夕陽歸去後又催明月上樓臺於是命居侍司職滿準別請代職者師不欲與是人交承望見準送入門即伏牕檻作嘔吐聲甚厲準知其情故指云此子無福職始解已得嘔血病大怒之師絕不為意暨出世嗣法薌雖屢屢拈出不著於人有云破蒲團上地裂天崩不從人得云云復懷香就座至仰山始為無準焚却尚有有準的無準的之語余謂雪巖年少被邁氣使而無準為一代宗師不能含忍致父子情乖如此凡據大方握麈拂者亦足自鑒
