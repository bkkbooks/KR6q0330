body:
  text: 雪巖和尚住潭州龍興禪寺語録嗣法門人昭如希陵等編師於寶祐元年八月初一日入院指三門盡大地是箇院子且道門從何入八字打開青天白日佛殿碧玉盤中珠宛轉琉璃殿上月徘徊是什麼人境界其或未辨端由且看新長老拈起坐具大展三拜法座百千佛祖向這裏屙潑天臭氣遍滿娑婆新龍興未免傾湘江之水洗教淨潔去也狼籍轉多拈香祝聖罷斂衣就座問答不録乃云少林一曲五傳至于六祖山深水寒發太古之清音調翻南嶽九世至于慈明唱高和峻奏絶聽之希聲所以佛法盛於江西湖南然浩浩然不可得而名焉豈料三百年後土曠人稀道隨時變黃鍾大呂寂而不作鄭音衛響亦乃不聞欽上座固無長處既在浙江那畔被一陳業風吹到潭州城裏只得改聲換調向十字街頭重翻此曲去也且道是何節拍擊拂子云萬年歡復舉趙州和尚云金佛不度爐木佛不度火泥佛不度水真佛內裏坐師拈云揭起如來正體發明向上宗猷趙州固是好手只是不合強生節目新龍興見處又且不然金佛度爐木佛度火泥佛度水真佛切忌話墮忽有個漢出來道你恁麼説正是強生節目拍膝一下將謂無人證明上堂一見便見一得永得展手云撒開兩手大家看畢竟明明是何物潭州內外有一十八座城門白日行人千千萬萬往往來來一任東西南北上堂純清絶點正是真常流注打破鏡來未免一場狼籍不若遇飯喫飯遇茶喫茶曉來獨立空庭外間對寒梅幾樹花冬至上堂展虗空作紙束虗空作筆謾寫書雲二字不分悔吝吉凶然雖如是龍興却要分似諸人去也上一畫短下一畫長形名曾未兆文彩已全彰看經上堂水緑山青鵲噪鴉鳴滿耳滿目非色非聲既非聲色却作麼生安名大方廣佛華嚴經上堂昨夜日從西沒舊年已去今朝日自東升新歲又來新歲既來有何奇特風前鐵樹花開別是一般春色上堂謝首座維那人天眼目佛祖綱維千差萬別一以貫之如何見得克賓法戰不勝南泉斬却貓兒上堂春日晴燒痕青布穀催耕處處鳴雖然底事最分明只是不得將眼看并耳聽何故才有一絲頭便有一絲頭解夏小參無解無結猶是空中釘橛有修有證何異捕風捉月所以龍興一夏百二十日只與現前清衆早眠晏起淡飯粗茶如三家村裏田舍翁挈挈波波只與麼過不敢將一絲毫叢林規矩束縛諸人是汝諸人便與麼撒手撒腳履踐得去十二時中不妨七穿八穴東倒西攂逆順卷舒縱橫自在擊拂子云白雲更在青山外復舉溈山問仰山子一夏不上來仰云鋤得一片畬種得一蘿粟溈云子可謂不虗過仰云和尚如何溈云日中一食夜後一宿仰云和尚亦不虗過道了乃吐舌溈云寂子何得自傷己命師拈云溈山與仰山是則子傳父業足可觀光逗到下梢又却遞相矛盾可謂父不父子不子矣龍興今夏亦無所作亦不空過且道與古人是同是別井底蟾蜍吞却月住湘西道林禪寺語録據室此是老圓悟斷佛祖命根去處今日不肖兒孫合作麼生乃袖手云有甚間工夫拈香祝聖罷斂衣就座云老屋半千間啓煅聖煅凡潑天爐鞴烏藤六七尺振乃佛乃祖墜地宗綱風高月冷海闊山遙逆順卷舒縱橫在我有時恁麼有時不恁麼家家門首透長安恁麼也得不恁麼也得處處緑楊堪繫馬只如高超物表不墮見知畢竟如何是六國晏清一句寺門高開洞庭野殿腳插入赤沙湖復舉保壽開堂三聖推出一僧壽便打三聖云與麼為人非但瞎却這僧眼瞎却鎮州一城人眼去在壽便歸方丈師拈云一收一放有主有賓蓋是尋常茶飯就中保壽三聖猶較一著且如何見得若無舉鼎拔山力千里烏騅不易騎當晚小參問答不録師云濟北之道出乎平常語默動靜脫體全彰三玄三要松直棘曲四賓四主鳧短鶴長所以老圓悟於諸佛出身處道薰風自南來殿閣生微涼帶纍妙喜打失眼睛鼻孔遍界難藏山蒼蒼水茫茫無眹迹絶承當竹籬茅舍江村外遠浦歸帆挂夕陽復舉麻谷訪臨濟問大悲千手眼阿那個是正眼濟云大悲千手眼阿那箇是正眼速道速道谷拽濟下禪牀却坐濟起云不審谷擬議濟拽谷下禪床却坐谷便出師拈云二大老恁麼激揚雖則百千手眼一時俱露又爭免得個二俱瞎漢且道還有檢點得出底麼瞎上堂因事并謝首座十五日以前雷聲甚大雨點全無十五日以後時清道泰家國晏然正當十五日恭惟宿來各各道體起居萬福畢竟如何堂中首座人天眼目上堂三月安居剋期取證始自今日且道今日以何為始下座與大衆普同作禮上堂栽田且博飯隨分煮藜莧一任少叢林佛法不怕爛更説甚麼喝下闡揚棒頭取辨又誰管你大乘井索小乘錢貫道林贏得日長無事倚闌干望見嶽麓山前文帝廟後有一對翹松雪鶴元是烏髖老鸛端午上堂天悠悠雲悠悠輥底浪花翻雪競龍舟當是時也可笑三閭楚大夫正在死水裡浸殺浸不殺千古萬古湘江闊上堂乳燕飛華屋梅子正香熟連核和皮一咬百雜碎元來祖意教意雪瀑挂層崖月狖啼寒木往往有般不知好惡漢聞道林恁麼道將謂以境示人拍膝一下云眼裏無筋一世貧上堂佛佛授受祖祖相傳西天梵語此土唐言風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲且道是唐言是梵語逢人不得錯舉上堂吹毛劒嚙鏃機肘後符頂門眼潭州城裡起五千間寨屋道林寺裡借一百名夫你輩後生晚進茄子瓠子喫現成飯知什麼碗冬至上堂謝橫舟相訪曉天月白古岸舟橫一陽來復吾道大亨直得千年晉柏樹與千尺陶公井起來叉手當胸互相慶賀道且喜寒氷發𦦨枯幹花開堂前露柱也懷胎臘八上堂黃面老子六載辛勤尋得鼻孔打失眼睛且道落在什麼處雪山午夜一天星上堂舉僧問趙州和尚如何是祖師西來意州云庭前柏樹子師頌云撮土成金古趙州據人來問直相酬聲前有意今誰委門外一江春水流佛涅槃上堂若謂釋迦老子古已入滅又道佛身充滿於法界而常處此菩提座若謂釋迦老子曾本不滅面前觸目無非山河大地草木叢林桃紅柳緑燕語鶯吟畢竟那個是釋迦老子驀召大衆衆回首乃云將謂瞌睡上堂海水不可斗量虗空不可尺度淨地不可撒沙爛泥不可著腳這四轉語轉轉有落處且道落在什麼處東京大相國寺裏有樹蕉芭風吹雨打一似破袈裟解夏小參九旬禁足東廊上西廊下灼然寸步不移休夏自恣據此堂坐此座不妨走盡天下恁麼見得猶是露布葛藤未具透關眼在且作麼生是透關眼莫有向天地未形以前生佛既興以後知得落處者麼若有道林三百六十骨節從頂至踵被伊一時透其或未然後五日去到諸方且居門外復舉百丈和尚每上堂常有一老人聽法一日衆散老人留身不去百丈問立者何人老人曰某甲於過去迦葉佛時曾住此山因學人問大修行底人還落因果也無對云不落因果墮野狐身今請和尚代一轉語老人乃問大修行底人還落因果也無百丈云不昧因果老人於言下大悟遂脫野狐身化去師頌云鐵牛對對黃金角木馬雙雙白玉蹄明舉似君如未會江南三月鷓鴣啼上堂打板坐禪禪無可坐聚頭喫飯飯無可喫只如每日鉢裏盛口裡咽眼裏見耳裡聞畢竟是個甚麼莫有向這裡分分曉曉道得一句子坐斷主人翁不落第二見者麼如無白日只陪人事過青春那得再來時冬夜小參群陰剝盡一陽復來萬頃清湘寒氷發𦦨千年古柏枯幹花開所以道小人道消君子道長四絶堂前地平如掌就中一人半人向這裡不移寸步挨拶得入便見主賓互換是非杳忘蒲團獨坐乾坤大愛日新添一線長復舉臺山路上有一婆子每遇僧問臺山路向什麼處去婆云驀直去師云錯僧才行婆云好個阿僧又與麼去師云錯後有人舉至趙州和尚州云待我與你勘破師云錯州至彼亦如是問婆亦如是答州回舉似大衆臺山路上婆子為汝勘破了也師云錯婆子心肝趙州五臟一揑揑碎撒在諸人懷裡了也且道是有勘破無勘破錯會者多上堂豆好合醬鹽好煮羮飯能療飢茶可止渴從上以來的的相承逗到理極情忘處無越乎此因甚楊岐老漢却道弄蹄驢子三隻腳開眼也著合眼也著歲夜小參一言道盡萬法平沈一句全提千差合轍即心即佛非佛非心麻三斤乾屎橛我且與麼是汝諸人畢竟作麼生領解若能向未開口以前退步就己一踏踏著元來臘月三十日便是歲除夜更無奇特玄妙者也之乎乾坤一統清如鏡那個男兒不丈夫復舉僧問趙州和尚萬法歸一一歸何處州云我在青州做一領布衫重七斤師拈云大小趙州正是腳下紅線不斷等間問著便見牽東補西若是道林則不然萬法歸一一歸何處劈脊便與三十雖則太煞傷慈要且一時慶快只今莫有與麼問底麼放過一著處州南明佛日禪寺語録入院小參拈拄杖云我為法王於法自在卓一下云鞭起巖前石虎咬殺無毛大蟲直得威震乾坤聲號萬籟佛殿脊金鴟𨁝跳上天厨堂口木魚走入滄海正恁麼時在諸人分上如何説箇自在底道理又喚那個作法不惜覿面當頭出來對衆道看其或口似磉盤靠拄杖云放過一著上堂石門巘嶮玉峽潺湲未到此間不妨疑著到則到矣平展一句又作麼生古路鐵蛇橫上堂衆無多寡道絶方隅小中現大塵包太虗丁此末法荒涼之運南明只得扶起森羅萬象熾然常説抑下從上佛祖盡作參徒參則固是且道以誰為師且請歸堂挂搭浴佛上堂四月八生悉達九龍吐水浴金軀雲門一棒要打殺是大神呪是大明呪是無上呪汝等諸人還見黃面老子麼以拄杖一時打散結夏以拂子打一圓相云以大圓覺為我伽藍安居有學無學萬象森羅發明所得非得平等性智於九十日中禁盡一切衆生之足而無住相斷盡一切衆生之命而無殺相乃至藏天地於一塵融古今於一念然後一塵塵各有一天地一念念各有一古今非延非促無自無他擊拂子云清茶淡飯衲僧家復舉臨濟問洛浦從上一人行棒一人行喝阿那個親浦云總不親濟云親處作麼生浦便喝濟便打師拈云二大老雖是啐同時要且未會轉身句在忽有人問如何是轉身句顧侍者云牢記取上堂刀不自割鏡不自照火不自熱風不自涼恁麼體理得去見聞知覺合作麼生聲香味觸復是阿誰南明今日已是惡口小家不懼諸方笑怪莫有檢點得出者麼若有合喫三十拄杖苟或不然幸自無瘡勿傷之也上堂天不能蓋地不能載即之本無棄之則在無本不無在即不在金剛與泥神揩背一拶粉碎上堂秋風蕭蕭夜雨飄飄孤峯絶頂轉見寂寥曠劫前頭時節看來不異今朝聞南明恁麼説話連道兩個不是却較些子若要向這裡承當打折你腰八月一日上堂方便門解脫門毗盧樓閣門以拄杖一擊八字俱開然雖如是只許向這裡暫時止宿一息一食而已若欲直趣大休大歇大安樂田地前頭大有活路在上堂丁一卓二見三下三和盤掇轉地覆天翻如來禪祖師意則且置逐日上山下嶺喫飯著衣如壯士屈伸不借他力何不瞥地咄賺殺你上堂舉靈雲見桃花公案師頌云兩岸夭桃花欲燃一絲風動釣魚船莫言世上無仙客須信壺中別有天上堂杜鵑啼血滿花枝底事匇匇苦勸歸歸到故鄉還似客村村緑暗與紅稀函蓋乾坤句隨波逐浪句截斷衆流句向這裡薦得一串穿却楊岐驢子三隻腳上堂落花三月雨殘夢五更鐘聲色俱銷盡玄關又一重却不得道更須直下盡底掀翻何故須彌山上堂才恁麼不恁麼有來由沒來由下里灘頭廖鬍子釣得一雙紅鱗錦尾放下却是條鰍因甚如此斷岸孤舟上堂謝囦道講師復岩藏主一心三觀一句三玄曾無彼此休分教禪回途復妙也枯木岩前差路窮囦極流兮海底紅塵亘天只如一大藏教是箇