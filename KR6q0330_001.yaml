去來不動乾坤歲舊歲新新舊一般時節蒼卞山風骨自露太湖水徹底無波冷冷落落哆哆和和門外雪消春水滑庭前玉立桂婆娑復舉北禪賢和尚烹露地白牛分歲公案師拈云活剝耕牛北禪是則好手其奈墻塹不牢被箇販私鹽漢子和贓捉敗天寧則不然今夜無可管顧諸人不免烹箇獨角泥牛炊無米飯唱無聲曲與諸人分歲忽有箇漢出來道有公人索和尚筋角便與和聲一棒何故有功者賞袁州仰山禪寺語録山門我此潑天門戶大地一網俱收若是祥麟瑞鳳從教戴角擎頭然雖如是總過這邊著佛殿東土小釋迦指佛云看來即是你敢問夢升兜率天宮説離四句絶百非明什麼道理齊之以禮法座寶鏡高懸寶花散亂固是人人知有且道須彌燈王畢竟説什麼法躍七踏八拈香祝聖罷乃云日中一食夜後一息只得其體不得其用鋤一片畬下一籮種只得其用不得其體假使掀翻大地撥轉晨昏體用雙全人法雙泯在我臨濟門下正是萬里望崖州大遠在如何見得皇風蕩蕩皇天闊和煦發生晴晝長復舉興化和尚云三聖道我逢人則不出出則便為人興化則不然我逢人則出出則不為人師頌云弄晴微雨濕春風柳自青青花自紅寄語遊人急回首歌樓不在畫橋東當晚小參佛法遍在一切處豈間七閩二浙江東江西無過只是一箇夜暗晝明春寒秋熱而已就中忽有通方上士在背地裏拍手一下咳嗽一聲道長老將謂你來自冷泉亭上必新言語必異見聞元來伎倆也只恁麼拍頰一下云仰山罪過復舉僧問先仰山法身還解説法也無山云我説不得別有一人説得僧云説得底人在什麼處仰山推出枕子溈山聞得云寂子用劍刃上事師拈云法身説法已於問處流通推出枕子也只是箇信受奉行溈山老漢謂寂子用劒刃上事雖曰列段分科若是正文敢道不知落處佛涅槃上堂岸柳搖金溪桃吐玉波旬無端起舞阿難平地悲哭因甚如此親見如來面目上堂春日遲遲緑暗紅稀叵耐深山百舌也學江南杜宇聲聲報道不如歸仰山恁麼説話畢竟是賓家語主家語逢人不得錯舉乾會節提綱健行不息之謂乾萬法歸一之謂會會萬法歸自己者其惟聖人乎運乾德以位天者其惟至理乎理之至也本乎無作人之聖也體乎無為堯風蕩蕩兮舜日熙熙上堂洗面摸著鼻孔不知打破漆桶園裏蓬頭道者全無供養之心爛却瓜秧瓠種若也一向恁麼未免道絶人荒山僧只得與諸人隨分整頓卓拄杖云天地玄黃上堂只聞子聲不見子形忒煞分明只得其體不得其用可煞現成汝等諸人聞山僧恁麼道劈面便掌已是眼裏無筋欲向這裏承當賺儞平生上堂謝首座藏主秉拂大藏小藏全提半提挂眉間劒鋒鋩不露用聲前句收放莫知因甚如此卓拄杖云力囗希上堂有體有用無正無偏一法忽爾萬法亦然麻三斤乾屎撅庭前柏樹子拍膝一下云這裏會得不直半錢端午上堂記得文殊令善財童子是藥採將來善財拈一莖草度與文殊師云拾得莫服文殊云此藥亦能殺人亦能活人師云出門不換大小文殊是則為世醫王其奈被善財換却眼睛帶纍天下醫人至今盡賣假藥上堂一見便見蹉過了也明眼衲僧打失鼻孔山僧未跨集雲峰已在冷泉亭上與諸人眉毛𤺊結了也因甚逗到這裏又却十箇五雙面面不相識卓拄杖云鐵壁鐵壁上堂轉求轉遠不求更遠豈不見東野菴前水磨轆轆機輪自轉正恁麼時且道水轉磨轉須信中心樹子不轉上堂絶意識參離見聞學至切要處不離目前因甚向鼻尖上蹉過走盡天涯海角然雖如是仰山今日為汝保任此事終不虗也上堂舉僧問夾山如何是相似句山云荷葉團團團似鏡菱角尖尖尖似錐僧云學人不會山云風吹柳絮毛毬走雨打梨花蛺蝶飛師拈云大小夾山雖然不負來機被遮僧勘破仰山則不然如何是相似句荷葉團團團似鏡菱角尖尖尖似錐學人不會風吹柳絮毛毬走雨打梨花蛺蝶飛終是別些子上堂水不洗水金不博金青天白日自古自今山僧到此直是插手不入汝等諸人還信自己是仰山麼曹溪波浪如相似無限平人被陸沉上堂舉臨濟大師道赤肉團上有一無位真人在汝等諸人面門出入未證據者看有僧出問如何是無位真人濟下禪床搊住云道道僧擬議濟托開云無位真人是什麼乾屎橛師拈云臨濟大師如金翅擘滄海直取龍吞遮僧見義勇為已是當仁不讓只如被臨濟大師搊住畢竟是有語無語見月休觀指歸家罷問程上堂舉僧問魯祖如何是雙林樹祖云有相身中無相身僧云如何是無相身祖云金香爐下鐵崑崙師拈云魯祖恁麼答話始終只是説道理山僧則不然若有人問如何是雙林樹秋來葉落春到花開如何是春到花開那邊一片雲今日定下雨上堂事有萬殊法無異説寒但言寒熱但言熱忽若堂中露柱與庫司燈籠互相得失所爭多少卓拄杖一下云了上堂千説萬説不如親面一見千討萬討不知只在手頭寒風蕭蕭黃葉飄飄鶴眠松頂雲臥山腰幾番今日又明朝上堂道在日用日用不知飢只喫飯寒只添衣晴天愛日挂枯藜點檢溪頭梅樹向陽偷放南枝上堂寒風凜冽遙空下雪非特紅爐焰上莫覔蹤由逗入蘆花深處猶難辨別往往到這裏十箇有五雙盡道明一色邊事殊不知正是空中花眼中屑正恁麼時且道是天寒人寒下座巡堂喫茶冬至小參群陰剝盡天依舊是天一陽復來地依舊是地因什麼又却道石筍抽條氷河𦦨起冷灰豆𪹼枯木花開苟能於此見得徹去許你會西來意其或未然世間相常住是法住法位復舉金峰問僧甚處來僧云東國來峰云作麼生過得金峰關僧云行止分明峰云試呈似金峰看僧展兩手峰云金峰關從來無人過得僧云和尚過得麼峰云波斯喫胡椒師拈云過關須是透關眼守關須是把關人金峰不覺瞌睡致被遮僧衝突雖然蕩蕩一條官驛路晨昏曾不禁人行上堂松直棘曲鳧短鶴長日移山影轉風送野花香無非發越佛祖祕密寶藏於未彰聲色之先是汝諸人作麼生承當切忌認奴作郎上堂春雨溟濛春雲靉靆忽然杲日當空天不能遮地不能載正恁麼時如來禪且置祖師禪未在因甚如此只許參不許會上堂解語非干舌能言不是聲碧班班碧剝當滴帝都丁訛聞誤聽認烏作焉則且置一真未具以前如何辨明鼠咬鐵釘上堂進則撞頭磕額退則墮坑落塹動則犯手傷鋒佛法何曾夢見咄莫道仰山今日無為人方便結夏上堂護生須是殺自傷己命殺盡始安居難逃業鏡會得箇中意鐵船水上浮莫也是虗空釘橛鉢盂安柄仰山今日不遵古規且要別行條令作麼生一切尋常只據現定上堂如貓捕鼠雙目瞪視而不瞬蹉過了也似鼠搬薑咬著全無滋味好箇消息仰山一等不怕諸方笑怪更為下箇注腳作麼生無風荷葉動決定有魚行上堂處處現成頭頭成現譬如關頭水急茶磨不撥終日自轉正恁麼時忽然歇水停輪且道是轉不轉薰風自南來殿閣生微涼入新僧堂上堂插一莖草建梵剎揑雙空手竪僧堂古今相去知多少七尺單前自較量莫有道得底麼如無拄杖子代為諸人通箇消息卓拄杖云天地玄黃宇宙洪荒中秋上堂暈入靈犀胎含老蚌正好修行正好供養有人於此拂袖便行腳跟下已喫三十拄杖何以見得禪歸海經歸藏上堂秋風生夜涼壞壁吟寒螿的的祖師意明明不覆藏然雖如是若以色見我以音聲求我非但不能見如來猶恐善因招惡果上堂父母未生前畢竟是什麼當體沒蹤由求之即蹉過不蹉過南北東西豈非我上堂秋氣凄清秋光淡蕩鷺鷥飛下遙天明月蘆花一樣古今多少人踏這田地不著又有多少人出這田地不得仰山今日破二裂三與諸人平展去也卓拄杖云不直半文錢上堂修造工夫已辨龍神土地亦安因甚水雲來往尚如月曉星殘山僧以是不禁冷淡未免總萬象於一堂同時挂搭與諸人朝暮同參卓拄杖云更添一單開爐上堂不冷不熱爐鞴半真半假金鍮鑄作瓶盤叉釧却成品字柴頭且道與趙州無賓主話相去多少疑則別參上堂是法非思量分別之所到是義非見聞覺知之所造三冬和氣暖烘烘半夜日頭紅杲杲搭著便回點即不到已是無端入荒草上堂火炙胸前暖風吹背後寒西來的的意親切不相干既是親切因甚却不相干德山見龍潭上堂粥鍋新砌從教翻鼎內波濤法鼓新鞔且聽震空中霹𮦷只如見聞未兆聲色未彰諸人在什麼處與仰山相見擡手云三門對佛殿上堂好雨知時節當春乃發生倒栽石上無根樹枝葉通身一夜萌竪拂子云情塵未脫有眼如盲上堂心是根法是塵兩種猶如鏡上痕鏡已破法不存疏影橫斜水清淺暗香浮動月黃昏上堂南薰入奏殿閣生涼西來祖意切忌商量何故向下文長上堂去者有鈎鈎你直饒向萬里無寸草處去依前寸步不移住者有錐錐你雖曰不離當處常湛然已在三千里外只如不去不住如何相見西風一陳來落葉兩三片中秋上堂非闕不知圓非圓不知闕圓闕本相因本無圓與闕既無圓闕是汝諸人向甚處見月竪拂子云團團離海嶠漸漸出雲衢打圓相此夜一輪滿清光何處無佛生上堂一棒打不殺千古阿剌剌是阿誰兮名悉達更問如何兮四月八上堂禪禪碌磚道道木頭會得全無巴鼻不會却有來由何似雲門六不收上堂久雨得晴天清地寧恰似迷雲忽散皎若心月孤明空洞生死照了諸相是則慶快平生只是不得在他光影裡轉失却眼睛何故無一絲毫不現成上堂坐本無拘何必曰放動靜但見一如日用自然虗曠鵲噪鴉鳴水緑山青騰騰任運不知名也是錯認定盤星上堂卓拄杖有權有實有照有用匇匇夏影將殘颯颯涼飈又動四時代謝日月如流萬法乘除有無似夢獨有老趙州太惺惺復懞懂却道蘿蔔三斤重上堂連朝淹黑豆黑豆已萌芽滿地天風起吹開劫外花涅槃經中有三段義且道與法華經羊車鹿車牛車是同是別珊瑚枝枝撑著月上堂油油開口不在舌頭莫莫滋味看來太薄細思量休卜度令人常憶老龍牙手裡把柄木杓上堂謝興化首座人從興化來接得劒州信説道淩霄峰頂碁盤元是錢王石鏡二十年前一共看今日重逢有何照證展手云面目見在元宵上堂雨中燈雲中月最分明太皎潔汝等諸人聞恁麼道將謂夢中説夢殊不知荊棘林中一片田園迥別且道與仰山相去多少異車同轍上堂一塵入正受諸塵三昧起鉢裏飯桶裏水身空萬法空衆類悉皆同柳自緑花自紅衆中莫有胸藏日月袖裹乾坤底麼出來露箇消息如無各自嘴盧都無準和尚忌拈香巴陵三轉語大仰一甌茶有恩成怨恨無事是讎家杜鵑啼血染山花上堂晨朝喫粥齋時喫飯人人盡知有開單展鉢拈匙放筯一一不借他人手因甚佛法二字等間問著便千生萬受卓拄杖云只為分明極翻令所得遲上堂有句無句如藤倚樹白鷺下田千點雪樹倒藤枯句歸何處黃鸝上樹一枝花三千里外賣却布單不遠而來因甚放下泥盤呵呵大笑毗婆尸佛早留心直至如今不得妙上堂道無真體亦離見聞法無定相全超聲色所以道名不得狀不得取不得捨不得只如黃蘗痛打六十拄杖雪峰輥出三箇木毬却是什麼道理卓拄杖云吾無隱乎爾結夏上堂圓覺伽藍天是天地是地平等性智山是山水是水畢竟九十日內十二時中如何踐履青絹扇子足風涼上堂露地白牛黑黑是處尋他不得山青水緑似有如無眼見耳聞依稀倣佛全不顧時蹄角却在才動著時蹤由已沒月下間將短笛吹風前休把長繩勒阿呵呵也奇特如今趂亦不去自在東西南北冬夜小參陽升陰伏漢宮添一線之長日愛霜明魯史書五雲之瑞直得飛雪谷發寒氷光𦦨集雲峯抽石筍枝條君子道長小人道消鵬搏海運也九萬里而扶搖復舉僧問青原和尚如何是佛法大意原云廬陵米作麼價師頌云市行高下不須疑問著平人自得知紅豆殘鸚鵡粒碧梧棲老鳳凰枝上堂雲影重重山色濛濛天晴日出柳緑花紅雲門大師揚下乾屎橛直得清香遍地散為萬物春風汝等諸人聞恁麼道莫有掩鼻不甘底乃擘開胸云山僧有幾莖蓋膽毛上堂閏月月望月即尋常雲埋即暗雲散即光竪拂子云且道是雲耶是月耶切忌眼花小釋迦祖師忌拈香插鍬而立去死十分鍬便去弄鬼精魂山鳥山花笑殺人慚惶炷此一爐薰佛涅槃上堂焚三昧火自舉金棺阿難悲惱波旬喜歡總是如來清淨寂滅現前時節若謂明日即無今日即有何必瞞人自瞞直是令人大不甘上堂集雲一關似乎等間看時容易透時即難森羅萬象從教側目三世諸佛迥絶躋攀一徑古松苔蘚斑佛生日上堂東行西行指天指地盡謂如來降生我道魔王出世一棒打殺貴圖太平時當孟夏麥緑桑青上堂呼六為五破二作三眼觀東北意在西南仰山門下却不用遮般茶飯何故佛法不怕爛上堂謝青原居士眼空東魯口吸西江機鋒峻捷不讓老龐仰山遮裏別無禪道佛法只有一口吹毛利劒凜凜如霜要為人剪除毛病換骨洗腸長憶江南三月裡鷓鴣啼處百花香上堂高而無上低而無下上下三指彼此七馬臨濟大師到此咬嚼不破被黃蘗拄杖再三痛打今日落在仰山手裡莫有不負性命底麼卓拄杖幸自無瘡勿傷之也無準和尚忌拈香成龍者升天成蛇者攛草將謂隨一切性任其所適誰知憤憤悱悱却成煩惱集雲峰高日杲杲上堂我法妙難思亦復離言説百丈再參馬祖一喝三日耳聾直得黃蘗吐舌竪拂子云有甚交涉浴佛上堂無憂樹下右脅誕生已是造妖揑怪那堪七步周行雲門一棒打殺未為勦絶看來只好活葬解脫無底深坑依前日午打三更上堂結却布袋口拗折拄杖頭直得森羅萬象轉身無路三世諸佛吐氣無由集雲到此又却未免放開一線何也雨後青山翠欲流佛生上堂九龍吐水七步周行雲門一棒打殺正是摩頂授記葛藤枝蔓重生擲拂子云從教遍地縱橫上堂因看弄傀儡鬼面神頭線索牽抽神頭鬼面牽抽索線幾多觀底看底將謂是紅粉佳人當場妙舞手裡把柄輕羅白扇山僧未免為諸人揭翻布幕去也卓拄杖云伶俐衲僧一見便見上堂鋪帳簟青碧紗厨涼簟氷鋪三伏暑威不到水晶宮闕不如敢問諸人畢竟與洞山道向鑊湯爐炭裡回避還有商量處也無卓拄杖云蚊子上鐵牛上堂有物先天地以拂子打圓相無形本寂寥道什麼能為萬象主不逐四時凋話作兩橛向遮裡領略得去不用低頭思慮三門走入佛殿燈籠倒挂露柱上堂天寒人寒五蘊山頭仔細看風動幡動明眼人前休説夢仰山今日為汝保任此事直得左右逢原是非合轍甕裡何曾走却鱉上堂休擬議莫商量無朕兆絶承當君不見江路野梅無主自開自落分外馨香卓拄杖云一枝橫亞清波上引得遊蜂上下忙冬節小參一線迎長石女纖腰細舞五雲書瑞木人撫掌高歌直得天旋地轉陰伏陽升鐵樹花開氷河𦦨起只如老洞山掇退泰首座果卓與集雲峯面前各下一分相去多少冬不寒臘後看復舉僧問洞山寒暑到來如何回避山云何不向無寒暑處回避僧云如何是無寒暑處山云寒時寒殺闍黎熱時熱殺闍黎師拈云洞山與麼答話是則頭正尾正只是鼻孔落在遮僧手裡明眼道流試檢點看上堂坐教直猛著力提箇狗子佛性無萬緣俱屏息似銀山如鐵壁驀然一拶粉碎天地空人境忘寤寐如死生一萬別千差盡空寂上堂佛法世法一彩兩賽行住坐臥折旋俯仰著衣喫飯坐禪打眠總是現前三昧還信得及麼話在元宵上堂元宵令節且喜天晴高燒銀燭照佛光明集雲峰無油不點非常烜爀迥出常情何也我見燈明佛本光瑞如此無準和尚忌拈香盡道先師今日死誰知今日是生朝不知却有何憑據紫柏黃檀一處燒上堂舉僧問趙州和尚學人乍入叢林乞師指示州云喫粥了也未僧云喫粥了州云洗鉢盂去其僧有省師頌云晝影當軒夏日長只知喫粥著衣裳光陰倐忽催人老嫩緑駸駸已過墻上堂已是葛藤陳爛又況塺蒸生醭風前提起反覆看來未免零零星星斷斷續續如來禪祖師意沒巴鼻且作麼生是衲僧眼目卓拄杖云六六依前三十六上堂薰風自南來殿閣生微涼諸佛出身處切忌錯商量縱使言前薦得句外承當仰山敢道未在何故嫩竹敲風鳴翡翠芰荷翻雨潑鴛鴦上堂天寒人寒大寒小寒熱則普天匝地熱寒則普天匝地寒熱不自熱寒不自寒紅日上三竿當陽仔細看冬節小參靈源湛寂不知節序循環大道沖虗靜看陰陽消長所以道有物先天地無形本寂寥能為萬象主不逐四時凋竪拂子云還見麼擊拂子云還聞麼只此見聞非見聞無餘聲色可呈君嶺梅破雪偷開眼一點清香欲斷魂復舉洞山和尚冬夜與泰首座喫果子次洞山云有一物黑似漆執之失度必入邪路常在動用中動用中收不得放之自然體無去住過在什麼處喝一喝過在動用中相隨來也洞山掇退果卓酒逢知己飲詩向會人吟只如末後一著畢竟是什麼果子洞庭千樹橘新熟夜來霜元宵上堂去歲元宵節無油不點燈今歲元宵節有月照危層藥師琉璃光佛示現端嚴妙相一一在諸人眉毛眼睫上放大光明還見麼見被見礙不見被不見礙去却見除却礙三門與佛殿相對除夜小參歲舊年新夜暗晝明未嘗移易日遷月化山青水緑依舊尋常小盡二十九大盡三十日也是鎮州蘿蔔漢地生薑休咬嚼沒商量梅花紙帳一爐香衲被蒙頭春晝長復舉僧問古德年窮歲盡事如何德云東村王老夜燒錢師頌云春風陌上郎得錢隨手使貨物忽相當撞得恰好子佛涅槃上堂不生不滅之性溪桃映水而紅岸柳和煙而緑無去無來之相雪瀑噴空而下雲峰拔地而高我佛如來正大法眼無量祕密寶藏盡底打開一時分付了也只是道今日則有明日則無未可容易注破何也長憶江南春雨後夕陽影裡鷓鴣啼上堂湛湛澄澄孤明歷歷未是到家消息直饒盡底掀翻不留朕迹其奈參天荊棘仰山莫別有為人方便麼擲下拄杖臥龍才奮迅丹鳳便翱翔佛生上堂指天指地點胸點肋將謂六識未具初生孩兒元來通身是膽白拈正賊雲門老師道一棒打殺餵狗不妨奇特祈晴上堂久雨不晴浸爛衲僧鼻孔如何是衲僧鼻孔浮雲散盡碧天寬赫赫金盆海裏湧上堂禪樹上呌喧喧道門前風浩浩冷地思量真可笑笑什麼等間拾得一顆蘇州梨看來却是青州棗解夏小參九旬禁足三月護生逗到功成行滿依前日午三更龍囦水風恬浪靜獺徑橋霧鎖雲橫去者自去住者自住坐者自坐行者自行因甚如此杖頭縱有通霄路且共扶持折腳鐺復舉夾山和尚示衆云閙市門頭識取天子百草頭上薦取老僧與麼説話正是妄認前塵分別影事若是端拱垂衣孤峰獨宿未夢見在汝等諸人要見夾山麼還識仰山麼竪拂子云一狀領過上堂動絃別曲葉落知秋大千沙界一舉全收竪拂子云一毛頭上師子示現百億毛頭中秋上堂好供養好修行拂袖便去也不多爭何故此夜一輪滿清光何處無開爐上堂火冷灰寒炭又無大家坐嘴盧都冷灰堆裡忽豆𪹼大地通紅火一爐世界與麼闊火爐與麼闊則不問且道香匙火筯大小長短相去多少不得動著上堂覔起處不得尋覔處無地見色元來見心見了元來不是是不是鏡不照鏡兮水不洗水上堂法逐心生心隨法變心法雙忘千化萬變扇子𨁝跳上三十三天𡎺著帝釋鼻孔盞子撲落地楪子成七片雖是一期方便竪拂子云聞名不如見面上堂澄潭月影靜夜鐘聲不留而照不待而鳴而亦離聞絶見非色非聲畢竟是誰見誰聽以拂子打圓相擊一擊下座上堂昏沉散亂莫非本地風光絶點純清正是真常流注非不非是不是差之毫𨤲失之千里噴喋一聲幸然無些子事何須強説道理上堂至理忘言至言無説無説與無言總是鉢盂安柄虗空釘橛仰山與麼告報莫別有長處良久云也是第二月佛成道上堂道本無形亦本無名未聞其壞安有其成黃面漢不合造妖揑怪指出夜半一星帶纍後代兒孫盡是哺糟啜醨倣倣佛佛至今醉夢不醒山僧拄杖子未免為諸人別開一隻眼作金雞報曉一聲卓拄杖云紅日升天萬國明冬至小參隨例裝冬雪白糍糕切玉非常有果錦紅龍荔生春天外寒風凜冽山中和氣氤氳二三百衲子挨肩並足六七十老漢鼓舌搖脣一時運此食輪法輪如意輪一陽來復日新日新日日新然雖如是金屑雖貴落眼成塵復舉疏山仁和尚因僧問如何是冬來事山云京師出大黃師頌云影推移線日長無言童子自商量雖然不是神仙藥海上傳來第一方上堂箇事本成現覔則不可見白圭本無瑕琢磨乃成玷執之以實法空中生閃電視之以等間腳下添紅線若是學道人好好看方便作麼生莫看仙人手中扇上堂集雲峰頭獨立仰祝聖壽無極百千甲子春秋臣僧今日七十乙酉正月初一上堂春風蕩蕩春日熙熙花開笑面柳展歡眉處處呢喃紫燕聲聲睍睆黃鸝麻三斤乾屎橛庭前柏樹子遮裡見得全理全事無是無非坐斷集雲峰頂上大家齊賀太平時上堂一夜雨聲滴滴元是簷前雪消冷地令人憶著相國寺裡芭蕉何也零零落落一似宜春臺上正月八日趕齋和尚底七條上堂時光荏苒己事朦朧安得桶篐忽𪹼連底俱空內空外空內外空從上佛祖言教固是半字不留山河大地何處覔針鋒擊拂云馬祖一喝百丈三日耳聾上堂久雨忽晴心光發明團團紅日寥寥太清非特好曬朗亦乃好經營下秧種粟桑麻漸青緑楊枝上曉鶯鳴長連牀上開單展鉢可煞現成卓拄杖一下上堂至化無方至德有光遲日江山麗春風花草香玉壺影裡劫春長乾坤獨露堂堂上堂春山重重夜雨濛濛長連床上閉眉合眼睡到曉鐘心也空法也空不起第二念坐斷主人翁好安樂也兄弟上堂進無前退無後毫髮參差便成窠臼八月二十五洞山離查渡雲門道放子三十棒却做麼生無端無端生受生受
