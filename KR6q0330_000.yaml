front:
  text: 雪巖師可謂鼻端眼正矣以無準為之父以高峯為之子父作之子述之觀其所從來又觀其所付授則巖之道可知矣雖然良馬不待驅策望見鞭影而馳獅子無法教兒直向懸崖一拶諸人若能於文采未彰一字已多之前一刀兩段薦取便見三老卓卓巍巍長在諸人門面上放大寶光轉大法輪一生參學事畢矣不然刻舟求劒待兔守株併一𠕋巨編都成鬼神茶飯去也余不解禪戲論如此巖門人持師語録來漫題編端大德二年三月上浣性存真逸家之巽書雪巖和尚語録目次卷第一潭州龍興禪寺語録湘西道林禪寺語録處州南明佛日禪寺語録台州仙居護聖禪寺語録湖州光孝禪寺語録袁州仰山禪寺語録卷第二普說卷第三舉古卷第四法語書序銘偈頌自讚跋補遺
