body:
  text: 嗣法門人昭如希陵等編舉古上堂向上一關明如杲日絲毫擬議如隔鐵圍是汝諸人到遮裏如何理論試舉看釋迦老子在靈山會上拈一枝花瞬青蓮目普視大衆時百萬人天惟迦葉破顏微笑世尊云五有正法眼藏涅槃妙心實相無相微妙法門付囑於汝汝當護持流通毋令斷絶敢問諸人畢竟喚什麼作正法眼藏既是實相如何説箇無相底道理微妙法門又從什麼處入遮一枝花在世尊手裏不曾動著付囑箇什麼汝當流通毋令斷絶又教什麼人流通還知麼若也未知更聽仰山為汝從頭説破若是正法眼藏敢道釋迦老子自無半錢分實相無相惟其無相所以實相現前山青水緑鴉鳴鵲噪夜暗晝明風動雲起處處皆微妙法門除是離却見聞絶却現行不移跬步全身已在裏許然後見門裏出身易身裏出門難若是遮一枝花世尊未曾拈起已被迦葉與百萬人天和根摵碎了也更説什麼付囑汝當護持流通毋令斷絶自古自今接響承虗如稻麻竹葦如靈雲見桃花便道三十年來尋劒客幾回落葉又抽枝自從一見桃花後直至如今更不疑香嚴去除糞穢瓦礫擊竹作聲便道一擊忘所知更不假修治動容揚古路不墮峭然機處處無蹤迹聲色外威儀諸方達道者咸言上上機此二老可謂聽事不真喚鐘作甕又如太原聞畫角溈山撼門扇黃蘗吐舌龍潭吹滅紙燭臨濟喫三頓痛棒異端並起邪法難扶到遮裏須是箇漢始得有麼有麼如無更聽一頌無影枝頭一點春笑他無地可藏身黃金自有黃金價何必和沙賣與人上堂金不博金水不洗水啐同時劒去久矣且道是什麼人發明如是事試舉看達磨大師自西天竺國而至金陵見梁武帝帝問曰如何是聖諦第一義達磨答云廓然無聖武帝曰對朕者誰磨云不識帝不契達磨因此折蘆渡江至魏後武帝舉問志公公曰陛下識此人否曰不識志云此是觀音大士傳佛心印帝曰當遣使去詔志公曰莫道陛下合國人追他亦不回達磨與武帝一挨一拶如兩鏡相照間不容髮無端被志公向明鏡上彩畫虗空翻成瑕翳武帝問云如何是聖諦第一義當時教法盛行教家有真俗二諦之説第一義即真諦也達磨云廓然無聖且道是為武帝説答他語畢竟廓然無聖理作麼生聖諦第一義義何所宗兄弟到遮裏也須是著些子眼腦揣摩始得往往盡道武帝被達磨當面熱瞞殊不知武帝自是箇作家君王到他面前一點子也用不著你看他才被達磨道箇廓然無聖隨口便問對朕者誰好兄弟遮一句子大親切達磨到遮裏未免露出本來面目道箇不識武帝不契又是放開漫天鐵網了也只如折蘆渡江至魏且道出得梁朝天地也無帝後舉問志公也要此話大行志公云陛下識此人否臂肘不向外曲帝云不識達磨元來猶在志云此是觀音大士傳佛心宗和聲便好一時屏出帝云當遣使詔能縱能奪能殺能活公云莫道陛下合國人去他亦不回若回堪作什麼此是祖師門下第一箇話頭頌者拈者自古及今不知多少未免盡道武帝蹉過達磨誠謂刁刀相似魚魯參差一箭尋常落一雕更加一箭已相饒直歸少室峯前坐梁主休云更去招此是白雲端和尚頌今時兄弟將謂一箭尋常落一雕是頌廓然無聖更加一箭已相饒是頌不識若如是又是箇識情計較討什麼白雲端和尚也末後却道直歸少室峯前坐梁主休云更去招又只是尋常世俗之話大凡宗門下語言不説體便説用不説事便説理却如何只恁麼説若向遮兩句下親見白雲和尚方知道遮兩句一句全體一句全用於二中間事理雙全然後則知白雲與達磨武帝在楊子江心握手却在鳳凰臺上相逢鳳凰臺上握手却在楊子江心相見雪竇和尚頌云聖諦廓然何當辨的對朕者誰還云不識遮四句一時頌了也為他才地寬闊又向下面下箇注腳道因茲暗渡江豈免生荊棘遮兩句占了多少田地合國人追不再來千古萬古空相憶休相憶清風匝地有何極要緊是遮一句子若向遮一句下透得一千七百則公案許你一串穿却且道遮一句落在什麼處遮裏有祖師麼喚來與老僧洗腳保寧勇和尚頌云煉得通紅打一鎚周遭無數火星飛十成好箇金剛鑽攤向門前賣與誰遮四句子却無你下口處亦無你計較處且道落在達磨分上武帝分上志公分上須是參始得山僧效顰也有一頌西來十萬路迢迢智鑑當軒影莫逃四海浪平龍睡穩九霄雲淨鶴飛高上堂玉樹瓊林寶階銀闕皓若蘆花恍然明月直鈎垂釣自有金鱗上鈎地平如掌依舊七凹八凸且道是什麼人有如是照用得如是心髓了如是因緣試舉看二祖神光於少林初參達磨時天大雪神光堅立雪中不動遲明積雪齊腰可謂是埋沒天地孤負自己達磨閔而問曰汝久立雪中當求何事已是和贓捉敗光悲泣曰願和尚慈悲開甘露門廣度羣品若不折蘆渡江幾被梁主毒手磨曰諸佛無上妙道曠劫精勤能行難行能忍難忍豈以小德小智輕心慢心欲繼真乘徒受勞苦神光聞師誨勵潛取利刃自斷左臂置于師前是名真法供養達磨知是法器乃曰諸佛最初求道為法亡軀汝今斷臂吾前求亦可在因與易名慧可向什麼處著光問曰諸佛法印可得聞乎但盡凡情別無聖量磨云諸佛法印不從人得將謂自西天帶來光曰我心未安乞師安心喝一喝甘伏聽人處分磨曰將心來為汝安光曰內外覔心了不可得一翳在目空花亂墜磨曰我為汝安心竟賺了古今多少兒孫面壁九年將謂有多少奇特平地無端陷了神光白著隻臂是汝諸人且道立雪齊腰正恁麼時是有心耶無心耶於覔心不可得處與雪深三尺相去幾何遮裏著得一隻眼便見神光大師立地處便知諸佛法印不從人得利刀斷臂如斬太虗覔心不得處山河大地脫爾現前只改舊時行履處依前只是舊時人所以白雲端和尚頌云終始覔心不可得寥寥不見少林人滿庭舊雪重知冷鼻孔依前搭上唇鼻孔在面上是定終不生在頷下妙喜頌云覔心不得更何安嚼碎通紅鐵一團縱使眼開張意氣爭如不受老胡瞞立雪齊腰寒凍徹骨妙喜却云嚼碎通紅鐵一團何得句語相返畢竟意作麼生你兄弟家無事也須東咬西嚼自家卜度看忽然蹉口咬著方知道諸佛法印果然不從人得無為子頌云九年面壁太多言接得門人一臂全京洛至今三尺雪天寒何止普通年九年面壁默然而坐他却道九年面壁太多言只遮太多言三字畢竟如何體解京洛至今三尺雪非獨京洛直得盡大地六月盡是嚴霜汝等諸人還覺寒毛卓竪麼其或未然聽取一頌利刀拈起白如霜可惜無端成自傷消盡少林三尺雪古今天地只尋常上堂明如日黑似漆取不得捨不得是什麼試舉看五祖大師示衆索偈欲傳衣法堂中上座呈偈云身似菩提樹心如明鏡臺時時勤拂拭無使惹塵埃過遮邊著六祖能大師和云菩提本無樹明鏡亦非臺本來無一物何處惹塵埃也是背後叉手北秀南能大似徐六擔板各見一邊已為諸人掃蕩了也仰山莫別有長處麼聽取一頌時勤拂拭與掀翻錯莫無端認定盤點石化為金玉易勸人除却是非難上堂三界惟心萬法惟識譬如擲劒揮空莫論及與不及真不掩偽曲不藏直畢竟如何辨的試舉看六祖能大師至法性寺暮夜風揚剎幡聞二僧對論禍不入慎家之門一僧云風動錯一僧云幡動錯往返未能契理一對無孔鐵鎚祖云還許俗流輒預高論否鼠口應無象牙祖曰仁者心動錯山僧在天目會中聞舉老佛照在室中要舉是風動是幡動遮僧如何不是風動不是幡動甚處見祖師天目下語是風動是幡動遮僧如何貪觀白浪失却手橈不是風動不是幡動甚處見祖師揭却腦蓋佛照喜之後到松源會下因舉前話松源乃橫點頭且道是不肯佛照如此舉話耶是不肯天目如此下語耶汝等諸人若於橫點頭處見得祖師識破二僧便見法昌遇和尚頌云不是風兮不是幡黑花貓子面門斑夜行人只貪明月不覺和衣渡水寒畢竟遮一頌意作麼生只如道不是風兮不是幡黑花貓子面門斑却落在什麼處後面又道夜行人只貪明月不覺和衣渡水寒又作麼生如今有一等在情識意路上行底未免道是頌二僧只知是風動是幡動却不知是心動若果如是法昌堪作什麼當知道他古人著著自有出身之路豈不見保寧勇和尚頌云蕩蕩一條官驛路晨昏曾不禁人行渾家不是不進步無奈當門荊棘生不妨説得太煞明白山僧今日舉也舉了注也注了只是要見祖師與二僧大遠在聽取一頌兩岸桃花紅欲然洞中流出自涓涓仙家不會論春夏石爛松枯是一年上堂依依稀稀倣倣佛佛名不得狀不得三世諸佛於此沒溺深坑帶纍天下老和尚與盡大地衲子總跳不出試舉看南嶽讓和尚往曹溪參六祖棄却衣下明珠却向外邊尋逐祖問甚處來曲開方便讓曰嵩山來道途跋涉曰什麼物恁麼來無端無端讓曰説似一物即不中大好大好祖曰還假修證也無探竿影草讓曰修證即不無染汙即不得添得一重狼籍祖曰即此不染汙諸佛之所護念汝既如是吾亦如是冬瓜印子然雖如是自古自今撑天拄地戴角擎頭者如稻麻竹葦要且未有一人脫得遮箇印子且道印文在什麼處豈不見汾陽頌道因師顧問自何來報道嵩山意不回修證不無不染汙撥雲見日便心開灼然要承當箇事須是如撥雲見日始得畢竟那裏是他撥雲見日處莫是説似一物即不中麼不是遮箇道理又莫是修證即不無染汙即不得麼不是這箇道理且道那裏是他撥雲見日處到遮裏須是親面一見始得又不見保寧勇和尚頌云戴角披毛恁麼來鐵圍山嶽盡衝開閻浮踏殺人無數驀鼻渾牽拽不回若要撥雲見日須是有遮箇氣槩始得其或未然更聽一頌堂堂日用妙無痕才涉纖毫即是塵照水銀蟾沉夜魄戀花香蝶醉芳魂上堂白衣拜相平地登仙是人知有別無祕傳試舉看馬祖在菴中坐禪死水不藏龍讓禪師往問汝在此圖箇什麼打草驚蛇祖云圖作佛妄想不少讓乃取一片磚去磨垂絲千尺祖云磨磚作什麼上勾了也讓曰磨磚作鏡意在深潭祖云磨磚豈能成鏡已是照天照地讓云磨磚既不成鏡坐禪豈能成佛露出本來面目祖無對乃云如何即是把定咽喉了也讓云如牛駕車車若不行打車即是打牛即是喝一喝云汝等諸人若能於此一喝下承當得去莫問打牛打車和讓禪師手內一片磚百雜碎了也直得寒光炯炯洞徹山河讓禪師又謂祖曰汝學坐禪為學坐佛若學坐禪禪非坐臥若學坐佛佛非定相於無住法不應取舍若學坐佛即是殺佛若執坐相未達其理祖聞師誨如飲醍醐古人根器敏利輕輕一撥便轉豈似今人遲鈍終年卒歲從生至死只麼昏昏醉醉憨憨癡癡何時是了何不也向十二時中思量他古人道打車打牛畢竟意作麼生當知遮一句子便是金剛圈栗棘蓬一句中具三玄一玄中具三要也須東咬西咬試自嚼咬看忽然等間咬著方知道磨磚真箇成鏡坐禪斷不成佛聽取一頌萬法俱忘百念灰等間驀鼻拽將回鏡光一照明如日直得木人心眼開上堂世尊拈花迦葉微笑達磨九年面壁二祖立雪齊腰所謂以器傳器如印印空過此以往且道還有恁麼人發明如是事麼試舉看馬祖一日示衆曰汝等各信自心是佛此心即是佛心又曰心外無別佛佛外無別心不取善不舍惡淨穢二邊俱不依怙達罪性空念念不可得無自性故故三界惟心森羅萬象一法之所印凡所見色即是見心心不自心因色故有汝但隨時言説即事即理都無所礙菩提道果亦復如是於心所生即名曰色知色空故生即不生若了此意乃可隨時著衣喫飯長養聖胎任運過時更有何事馬簸箕與麼説話可謂傾盡自己心笑破他人口説箇心已是強立名字更説此心即是佛心所謂頭上安頭帶纍後代兒孫迷頭認影至今無有了日既知心外無別佛佛外無別心當知無亦本無無亦不立到遮箇田地方可謂萬象森羅一法之所印見色便見心汝等諸人即今各各見山見水見明見暗一一分曉一一明白自家本心還得親見也無若也未見豈不聞釋迦老子道明還明暗還暗礙還墻壁通還虗空不汝還者非汝而誰非汝而誰即汝心也心不自心故不可見既不可見汝但隨時言説即事即理都無所礙菩提道果煩惱無明但有其名都無實義所以道心生則種種法生於心所生即名為色知色空故生即不生生既不生當恁麼時喚作色即是心即是佛即是更討甚麼心覔什麼佛所以妙喜頌云即心即佛莫妄求非佛非心休別討紅爐𦦨上雪花飛一點清涼除熱惱且道紅爐𦦨上雪花飛正恁麼時是什麼境界還有佛可求心可覔麼更聽山僧一頌語默俱忘非是非聖凡情盡絶玄微穿花蛺蝶深深見點水蜻蜓款款飛上堂言發非聲色前不物當機覿面全提豈在拈槌竪拂山河大地不礙眼光萬象森羅形端影直有麼試舉看馬祖與百丈行次相將草裏輥見野鴨子飛過切忌隨聲逐色馬祖云是什麼千聖莫能名百丈云野鴨子錯認話頭馬祖云甚處去也明月蘆花兩岸秋百丈云飛去也夕陽西去水東流馬祖回搊百丈鼻頭果然落草百丈作忍痛聲遮禽獸馬祖云又道飛過去誤賺人家男女百丈有省笑殺傍觀馬祖尋常道凡所見色便見心心不自心因色故有色即是心心即是色色本非色心即無心無心而心全心即佛非色而色全色即心馬祖與百丈行次見野鴨子飛過去大地山河全體獨露馬祖曲盡老婆心與百丈當陽指出道是什麼百丈云野鴨子蹉過了也馬祖又與隨後一拶道在什麼處百丈云飛過去依舊不知歸馬祖到這裏未免傷鹽傷醋將百丈鼻頭一搊百丈忍痛作聲牽得回來堪作甚麼竪起拂云汝等諸人還見野鴨子麼放下拂如今在什麼處是汝諸人能於此掃破迷雲豁開慧日便見馬祖與百丈敗闕不少非但見得馬祖與百丈敗闕便見山谷道人見晦堂論此道晦堂云論語中有吾無隱乎爾一句學士試解説看山谷盡平生伎倆千説萬説只是不契晦堂意山谷到遮裏不奈何請益晦堂晦堂云學士久久自會一日相與遊山忽聞桂花香晦堂遂問山谷云什麼香山谷云桂花香晦堂隨後云吾無隱乎爾山谷於此豁然契悟雖然鼻孔未免落在晦堂手裏且道與馬祖搊百丈鼻頭相去多少百丈見處與山谷道人見處是同是別汝等諸人若向遮裏緇素得出許你具參學眼無垢狀元見妙喜與妙喜論正心誠意致知格物妙喜曰狀元只知格物不知物格無垢曰如何是物格妙喜曰唐明皇幸蜀斬畫像其人在陝西頭落無垢聞如此道轉見茫然因如廁有省乃有頌子云子韶格物妙喜物格元來一貫兩箇五百汝等諸人到遮裏要會格物則易要會物格則難見得物格也未免被山僧拂子串却鼻孔拂子且置野鴨子即今在什麼處聽取一頌那下飛來水面浮却來遮裏問蹤由只因回首不知處一揑通身冷汗流上堂語是謗默是誑語默向上事畢竟如何近傍試舉看百丈再參馬祖即日恭惟馬祖竪起拂子尊候萬福百丈云即此用離此用強生分別馬祖挂拂子於舊處依舊孟春猶寒馬祖却問百丈汝以後開兩片皮將何為人不可別更有也百丈亦竪起拂子好兒終不使爺錢祖云即此用離此用毫髮無差百丈挂拂子於舊處總離遮裏不得馬祖震威一喝醜舉止百丈於此大悟直得三日耳聾真箇麼往往盡道於喝下大悟殊不知阿魏無真水銀無假自古自今天下老和尚青黃不辨菽麥不分獨有雪竇較些子道大冶精金應無變色老汾陽頌云偶因無事侍師前師指繩床角上懸舉放却歸本位立分明一喝至今傳順朱填墨不是作家真淨文和尚頌云客情步步隨人轉有大威光不能見突然一喝雙耳聾那吒眼開黃蘗面大力量人語默裏轉却妙喜頌云馬駒腳下喪家風四海從今信息通烈𦦨堆中撈得月巍巍獨坐大雄峯説道理則不無要見馬祖百丈大遠在兄弟若欲承當箇事如隔墻見角便知是牛隔山見煙便知是火又如奔流度刃疾𦦨過風眨得眼來劒去久矣百丈當時才見其竪起拂子便折作兩段尤較些子無端問箇即此用離此用鼻繩便落在他手裏了也便被他橫拈倒拽至於震威一喝却道我當時大悟直得耳聾三日也大屈哉還識羞恥麼山僧到遮裏路見不平令人剗削只是寡不敵衆未免隨後也與一頌一喝當頭雷電奔人聞説亦暗消魂看來何止聾三日直到如今海嶽昏上堂寰中日月量外乾坤舉起也千差萬別放下也不立纖塵試舉看百丈凡參次有一老人隨衆聽法一日衆退老人不退丈乃問云面前何人老云非人也於過去迦葉佛時曾住此山因學人問大修行底人還落因果也無某甲對云不落因果五百生墮野狐身今請和尚代一轉語貴脫野狐身遂問大修行底人還落因果也無丈云不昧因果老人於言下大悟作禮云某甲已脫野狐身住在山後巖下乞依亡僧例丈令維那白衆食後送亡僧食後丈自領衆至山後巖下挑出死野狐乃依法火葬至晚上堂舉前事黃蘗便問古人錯答一轉語五百生墮野狐轉轉不錯合作箇什麼丈云近前來蘗近前打丈一掌丈拍手笑云將謂胡鬚赤更有赤鬚胡司馬頭陀舉前話問溈山山撼門扇三下汝等諸人能於溈山撼門扇處見得徹去即知五百生前百丈即是五百生後野狐五百生後野狐即是五百生前百丈要會不落因果麼拍左膝云遮裏是要會不昧因果麼拍右膝云遮裏是其或未然且更為諸人重下注腳百丈凡參次常有一老人隨衆聽法冷地看人長短一日衆退老人不退不是好心丈問云面前何人勾賊破家老人云非人也莫是野狐麼於過去迦葉佛時曾住此山且莫説夢因學人問大修行底人還落因果也無答云不落因果錯五百生墮野狐身即今是第幾生請和尚代一轉語貴脫野狐身為甚却作人言遂問大修行底人還落因果也無答云不昧因果錯老人於言下大悟作禮云某甲脫野狐身且信一半住在山後巖下敢告和尚乞依亡僧津送熟處難忘丈令維那白衆食後送亡僧齋後丈躬自巖下指出一死野狐依法火葬至晚上堂舉前事明破即不堪蘗便問古人錯答一轉語五百生墮野狐轉轉不錯作箇什麼大蟲元是虎丈云近前來將謂別有伎倆蘗近前打一掌慣捋虎鬚百丈拍手笑云將謂胡鬚赤更有赤鬚胡焦磚打著連底凍後司馬頭陀舉問溈山山撼門扇三下遮野狐精後來法昌遇和尚道雖則野狐脫去其奈吐下涎沫至今無人打屏法昌與麼道轉見狼藉敢問諸人不落因果為甚墮野狐錯不昧因果為甚脫野狐錯直饒道得落處分明未出野狐窠窟在錯法昌當時若見先與拈出雪峯古鏡教伊轉不得次與拈出紫胡狗子為伊斷却性命也是強説道理豈不見後百丈政禪師頌云畫師畫地獄畫出百千般駐筆從頭看特地骨毛寒還覺頂門重麼遮箇公案邪解者多錯會者不少如今有一種義學沙門喚遮箇作差別智涅槃心我且問你逐日風動塵起夜暗晝明與遮箇是同是別山僧輒隨己見亦成一頌南山雲起北山雲上界鐘聲下界聞遙望衆僧行道處天香桂子落紛紛上堂發越眹兆未形消息提持佛祖未行號令虗空斫額萬象拱聽且道是什麼時有恁麼事試舉看黃蘗斷際禪師示衆云汝等諸人盡是噇酒糟漢恁麼行腳何處有今日還知大唐國裏無禪師麼時有僧出云只如諸方匡徒領衆又作麼生蘗云不道無禪只是無師遮老漢三百六十骨節八萬四千毛竅一時揑碎撒在諸人懷裏了也若能於此直下承當得去可謂坐斷報化佛頭不費纖毫氣力儻或當面蹉過山僧未免矢上加尖為你重下注腳汝等諸人盡是噇酒糟漢非但汝等諸人三世佛祖也恁麼恁麼行腳何處有今日作麼生是今日事還知大唐國裏無禪師麼已是無風匝匝波時有僧出云只如諸方匡徒領衆又作麼生錯師云不道無禪只是無師擔板漢汝等諸人能於未開口未動舌以前識得黃蘗三世佛祖在你腳底脫或未然劒去久矣豈不見雪竇頌云凜凜威風不自誇端居寰宇定龍蛇大唐天子曾輕觸三度親遭弄爪牙大小雪竇盡力只道得箇端居寰海定龍蛇末後未免轉身無路却被風吹別調大慧老人頌云身上著衣方免寒口邊説食終不飽大唐國裏老婆禪今日為伊注破了却較些子仰山效顰也有一頌聲前一句蓋諸方指出乾坤是大唐但見皇風成一片不知何處是封疆上堂擘開太華放出黃河青天白日平地風波逗到伎窮力盡元來所得不多臨濟在黃蘗三年因首座教令上方丈問佛法的的大意坑陷人家男女被黃蘗打二十拄杖瞎如是三度被打銀山鐵壁既不契欲辭黃蘗却具些子丈夫氣息首座密啓黃蘗問話後生甚是不凡他日作一株大樹蔭涼天下人在來辭可方便指引著什麼死急臨濟辭黃蘗蘗云不須他處去只往大愚去臨濟到大愚愚問甚處來臨濟云黃蘗來愚問有何言句濟舉三度問三度被打某甲過在什麼處過犯彌天大愚云黃蘗老婆心切與麼為你得徹困更問有過無過在為蛇畫足臨濟於言下大悟云元來黃蘗佛法無多子飢來喫飯困來眠大愚搊住云遮尿床鬼子適來又道有過無過如今又道黃蘗佛法無多子是多少嶮臨濟向大愚肋下築三拳那邊喫攧來遮裏翻交大愚托開云汝師黃蘗非干我事上大人丘乙己臨濟遂返黃蘗依前只是舊時人只改舊時行履處黃蘗見問云汝又來作什麼濟云只為老婆心切説著令人滿面羞蘗云大愚老漢饒舌待他來痛與一頓黃蘗棒教誰喫濟近前打一掌知恩才解報恩蘗吟吟而笑云遮風顛漢却來遮裏捋虎鬚憐兒不覺醜金翅擘海直取龍吞臨濟被黃蘗打三頓拄杖盡大地風颯颯地暨乎末後向大愚肋下築三拳間不容髮所謂以器傳器以金博金且道與二祖立雪齊腰末後禮達磨三拜是同是別若向遮裏定當得出許你會一句中具三玄一玄中具三要至於有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪當甚碗脫丘後來白雲端和尚頌云一拳拳倒黃鶴樓一躍躍翻鸚鵡洲有意氣時增意氣不風流處也風流且道遮一頌落在黃蘗邊臨濟邊汝等諸人於此緇素得出許你明大法其或未然山僧也有頌東君有令不虗行三頓烏藤大險生龍得水時增意氣虎逢山色長威獰上堂海嶽震虗空裂萬象奔忙走不徹是什麼時節臨濟見僧入門便喝喝一喝云汝等諸人向遮裏直下承當得去大千沙界平沉三世佛祖拱手全聲即色全色即聲全體即用全用即體聲是體色是用用是聲體是色與麼會得便見有時一喝如金剛王寶劒有時一喝如踞地師子有時一喝為探竿影草有時一喝不作一喝用喝一喝那箇些兒是一喝不作一喝用那箇些兒是探竿影草那箇些兒是踞地師子那箇些兒是金剛王寶劒汝等諸人還辨明得出也無若也辨明不出山僧更為你從頭注破又喝一喝豈不是金剛王寶劒豈不是踞地師子豈不是探竿影草豈不是一喝不作一喝用又喝一喝云恁麼會得總是熱碗鳴聲所以道有時先照後用有時先用後照有時照用同時有時照用不同時有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪同時不同時俱奪俱不奪則且置汝等諸人畢竟喚什麼作人又喚什麼作境喚什麼作照又喚什麼作用喝一喝只此是人只此是境只此是照只此是用又喝一喝同時不同時一時奪却了也放汝命通汝氣試道看秦時轢𨍏鑽大隨和尚頌云一劒定煙塵憑何辨主賓梯山齊入貢誰識聖明君一喝是君一喝是臣只如賓與主又作麼生辨一劒定煙塵妙喜頌云入門便喝有甚巴鼻帶纍兒孫弄粥飯氣山僧也有一頌雨散雲收月正明無端平地鼓雷霆慣曾坐斷乾坤客喚作竅中蚯蚓聲上堂喫飯著衣事事成現俯仰折旋一見便見是甚麼臨濟大師示衆云赤肉團上有一無位真人常在汝等諸人面門出入未證據者看時有一僧出問云如何是無位真人臨濟下禪床搊住云道道無位真人是什麼乾屎橛大小臨濟用盡自己心笑破他人口赤肉團上有一無位真人無端話作兩橛常在汝等諸人面門出入未證據者看切忌迷頭認影時有僧出問云如何是無位真人滿口道著濟下禪床搊住云道道我今為汝保任此事終不虗也僧擬議且喜直下承當濟與一掌太殺傷慈托開云無位真人是什麼乾屎橛却較些子臨濟大師在黃蘗喫三頓拄杖末後到高安灘上得大愚點破也只悟得老婆禪自此佯狂詐癡見僧不掌便喝不喝便當胸搊住似遮般殘羮餿飯誰無一碗兩碗又謂之風力所轉又謂之弄粥飯氣仔細看來未為作者古云身心一如身外無餘遮裏又説箇赤肉團上又説箇無位真人豈不是話作兩橛既是從汝等諸人面門出入則六根六塵六識乃至十八界二十五有莫非此無位真人得大自在大達解脫遊戲之場更教什麼人看豈不是迷頭認影帶纍遮僧不識好惡出來問道如何是無位真人性命落在他人手裏了也所以當胸被人搊住也大屈哉若是當初才見他道箇赤肉團便與掀倒禪床末後遮一掌却是臨濟大師自喫始得鼓山老禪頌云面門出入見還難無位真人咫尺間去路一身輕似葉高名千古重如山妙喜老人頌云腦後見腮村僧大開眼了作夢雖然捉得老鼠一棒打破油甕汝等諸人且道那一句是頌他赤肉團上無位真人試自點檢看山僧也有一頌當機覿面黑漫漫且待輕輕著眼看剔起眉毛才擬議便為聞見色聲瞞上堂山花似錦澗水如藍面目現在誰是同參臨濟將遷化付囑三聖曰吾去世後不得滅却吾正法眼藏三聖云爭敢滅却濟曰忽有人問汝作麼生道三聖便喝濟曰誰知吾正法眼藏向遮瞎驢邊滅山青水緑夜暗晝明盡是此正法眼藏之光頭頭顯露處處發輝亘千萬劫不遷不變無壞無雜臨濟却道誰知吾正法眼藏向遮瞎驢邊滅莫是顛言倒語麼可惜三聖當時不能與伊絶却對他道爭敢滅却扶起臨濟大師醉後添杯道忽有人問汝作麼生道三聖也好一喝只是遲了三刻致被臨濟太阿倒持盡大地人至今亡鋒結舌山僧路見不平要為伊剗削臨濟將遷化時入地獄有分在吾去世後不得滅却吾正法眼藏瞎三聖云怎敢滅却已是掃土了也臨濟道忽有人問汝作麼生道待問即答三聖便喝忙作甚麼臨濟云誰知吾正法眼藏向遮瞎驢邊滅腦後見腮汝等諸人向遮裏還見得臨濟大師也無若也見得正法眼藏向遮瞎驢邊滅若也不見正法眼藏向遮瞎驢邊滅且道誵訛在什麼處保寧勇和尚頌云出門把手再叮嚀往往事從叮囑生路遠夜長休把火大家吹滅暗中行且道意作麼生如今有一種義學沙門往往道路遠夜長休把火是頌誰知吾正法眼藏向遮瞎驢邊滅却莫謗保寧好佛鑑勤和尚頌云瞎驢滅却正法眼出得兒孫滿大唐須信茫茫遠煙浪灼然別有好商量且道商量箇什麼莫是瞎驢滅却正法眼麼不是遮箇道理山僧也有一頌殺活縱橫得自由懸崖撒手覔冤讐瞎驢滅却正法眼射斗寒光夜不收上堂箭鋒相拄機栝相投得人一馬還人一牛更看靴裏輕輕動指頭大覺和尚興化為院主一日大覺問云我聞汝道向南方行一轉拄杖頭不曾撥著箇會佛法底你憑什麼有此語興化便喝覺便打化又喝覺又打明日化自法堂過大覺問云我直是疑你昨日兩喝試説來看化云我在三聖處學得底盡被師兄折合了也告和尚與存獎箇安樂法門大覺云遮瞎漢脫下衲衣待痛與一頓化於言下領旨二大老與麼相見作家則二俱作家落節則二俱落節我在南方行腳一轉拄杖頭不曾撥著箇會佛法底且喜天下太平興化拄杖在手正令不行却借三聖一喝未免被大覺盡情擒下只如道瞎漢脫下衲衣待痛與一頓與前兩次打棒相去多少興化於喝下領旨又悟箇什麼汝等諸人向遮裏點檢得出便見興化大覺一喝一棒直下發明臨濟心髓如杲日麗天又豈可以情意識卜度者哉興化道在三聖處學得底被師兄一時折合了也大覺被他一推落在萬仞懸崖之底至今出身不得聽取一頌劒為不平離寶匣藥因救病出金瓶南方自古清如鏡何必無端用甲兵上堂電光莫追石火猶遲搆弗及處心不可識智不可知興化和尚示衆云今日不用如何若何便請單刀直入興化為你證據時旻德長老出禮拜起便喝化亦喝旻德又喝化亦喝旻德禮拜化云若是別人三十棒一棒也較不得何故為你會一喝不作一喝用汝等諸人能於興化旻德未相見以前著得一隻眼則臨濟四喝四賓主四照用四種料揀不待舉而明矣山僧不怕諸方檢責試為諸人明辨看興化道今日不用如何若何便請單刀直入興化為你證據碧油幢下令不虗行旻德禮拜不顧危亡起便喝金剛寶劒化亦喝踞地師子旻德又喝化亦喝兩陳對圍曾無勝敗旻德禮拜深掘陷坑興化道若是別人三十棒一棒也較不得張弓架箭何故為他旻德會一喝不作一喝用收下了也是汝諸人於此還見得興化旻德麼若也不見聽取山僧一頌同時照用不同時權實雙行作者知有得雖然亦有失還他龍虎自交馳上堂量外機格外句凡聖迷魂佛祖罔措有來由無本據聲前切忌錯舉興化僧問四方八面來時如何化云打中間底僧便禮拜化云昨日赴箇村齋中途值一陳卒風暴雨却向古廟裏嚲得過遮老兒向大覺棒頭明得臨濟在黃蘗喫棒底意旨一向依模脫墼見僧不行棒行喝便是拏空塞空指東劃西欺胡謾漢只如道我聞東廊下也喝西廊下也喝直饒喝得興化上三十三天撲下來一點子氣息也無且待我蘇醒起來欵欵地向你道我未曾向紫羅帳裏撒珍珠在又如謂克賓曰汝不久為唱導之師克賓曰不入遮保社化曰汝會了不入不會了不入克賓曰總不恁麼化打曰克賓法戰不勝罰饡飯一堂明日上堂克賓維那法戰不勝罰錢五貫設饡飯一堂仍須出院莫即遮便是紫羅帳裏撒珍珠麼且道與昨日赴箇村齋值一陳卒風暴雨向古廟裏嚲得過相去多少汝等諸人於此揀辨得出便見興化三百六十骨節節節相連八萬四千毛孔孔孔皆透其或不然且聽山僧重下注腳僧問四方八面來時如何是什麼人化云打中間底棒折了也僧禮拜遍地是刀鎗興化云昨日赴箇村齋值一陳卒風暴雨向古廟裏嚲得過七佛以前也未有遮箇消息汝等諸人聞山僧恁麼道莫有不甘底麼若有出來對衆證據如無更聽一頌阿師昨日赴村齋幾被他人一窖埋暴雨卒風回避得也成平地露尸骸上堂機奪機句奪句覿面相呈更無回互棒頭有眼迥出常情語下無私如何分付南院示衆云諸方只具啐同時眼不具啐同時用時有僧出問云如何是啐同時用南院答云作家不啐啐同時失僧云此猶是某甲問處南院云汝問處作麼生僧云失南院打僧不肯後到雲門會下聞二僧舉此話一僧云南院當時棒折那僧於言下有省後回省覲值南院已遷化乃訪風穴穴問云莫是當時問先師啐同時話底麼僧云是風穴云汝當時作麼生僧云我當時如在燈影裏行風穴云汝會也諸方只具啐同時眼不具啐同時用南院與麼説話非但屈辱諸方抑亦鼓弄他家男女子啐母正恁麼時喚作同時用即是喚作同時眼即是遮僧不辨端由未免上他鈎線問道如何是啐同時用却被南院老人向咽喉下一捻道作家不啐啐同時失遮僧也會道此猶是學人問處南院翻一箇浪頭道你問處作麼生僧云失蝦跳不出斗南院便打終是老婆心切僧不肯後到雲門會下聞二僧舉此話一僧云當時南院棒折那冷地不甘僧有省八兩元來是半斤後往省覲千里迢迢任去來南院已遷化相見已了乃訪風穴因行不妨掉臂風穴問云莫是當時問先師啐同時話底麼面目現在僧云是還識羞麼風穴問云汝當時作麼生僧云我當時如在燈影裏行相似不但當時風穴云汝會也冬瓜印子若是仰山即不然諸方只具啐同時用不具啐同時眼忽有箇漢出來問如何是啐同時眼聽取一頌同時啐不同時石火電光猶較遲燈影裏行今已會蹉跎非是落便宜上堂人與境空境與人會百尺竿頭一采兩賽有麼試舉看風穴示衆云若立一塵家國興盛野老顰蹙不立一塵家國喪亡野老安帖於斯明得闍黎無分全是老僧於此不明老僧即是闍黎闍黎與老僧亦能悟却天下人亦能迷却天下人要識闍黎麼以手左邊拍一拍遮裏是要識老僧麼以手拍右邊云遮裏是雲門云遮裏即易那裏即難跛腳師也是醉後添杯汝等諸人能向天地未形生佛既興識得二大老則有時奪人不奪境有時奪境不奪人有時人境兩俱奪有時人境俱不奪當什麼祭鬼神茶飯脫或不然且聽山僧下箇注腳若立一塵家國興盛野老顰蹙山河大地不礙眼光不立一塵家國喪亡野老安帖盡大地要覔纖塵了不可得於此明得闍黎無分全是老僧三世佛祖齊立下風於此不明老僧即是闍黎盡大地人仰望不及老僧與闍黎亦能悟却天下人亦能迷却天下人人貧智短馬瘦毛長要識闍黎麼遮裏是四五百條花柳巷二三千處管絃樓要識老僧麼遮裏是有意氣時添意氣不風流處也風流只如道遮裏則易那裏則難又作麼生却須參始得山僧到此已是口裏膠生未免借古人鼻孔為諸人別資一路拈拄杖云即此見聞非見聞無餘聲色可呈君箇中若了全無事體用何妨分不分如其不然又聽一頌且看雙放更雙收有底歡聲無底愁一切聖賢如電拂大千沙界海中漚上堂聲前句格外機無得無失無是無非無孔由來是鐵鎚且道是什麼時節有什麼事試舉看僧問風穴語默涉離微如何通不犯風穴云長憶江南三月裏鷓鴣啼處百花香風穴老漢與麼道是則得路便行到手便用依舊未出得語默離微在若是仰山即不然忽有人問語默涉離微如何通不犯也只向他道長憶江南三月裏鷓鴣啼處百花香且道與古人相去多少若也點檢得出開口不在舌上其或未然豈不見妙喜頌云忽爾出門先見路才方舉足便登船十成祕訣真堪惜父子雖親不可傳雖然妙不可傳更聽山僧為諸人下箇注腳僧問語默涉離微如何通不犯錯答云長憶江南三月裏鷓鴣啼處百花香普汝等諸人能於遮兩句下承當得去一大藏教與一千七百則陳爛葛藤不消咳嗽一聲一筆勾下更若不然聽取一頌脫然語默去離微覿面持來付與誰荷葉團團團似鏡菱角尖尖尖似錐上堂巇嶮中平實平實處誵訛覿面承當得去元來用處不多僧問首山如何是佛法大意山云楚王城畔汝水東流汝等諸人能於未開口以前見得遮老漢函蓋乾坤句隨波逐浪句截斷衆流句一筆勾下便見慈明道宜陽秀水南嶽石橋楊岐道筠陽九岫萍實楊岐一印印定如印印泥如印印水如印印空毫髮不移以至僧問如何是佛新婦騎驢阿翁牽如何是祖師西來意風吹日炙學人乍到寶山空手回時如何家家門前火把子謂之家貧難辦素食事忙弗及草書只如僧問趙州狗子還有佛性也無州云無如何是祖師西來意庭前柏樹子僧問雲門如何是佛乾屎橛僧問洞山如何是佛麻三斤且道相去多少還緇素得出麼須知道千句萬句只是一句百千萬億句終無第二句還信得及麼更聽一頌暑往寒來春復秋夕陽西去水東流茫茫宇宙人無數那箇親曾到地頭上堂解語非干舌能言不是聲既不是聲畢竟是箇什麼若也已知不在忉怛其或不然試聽舉看僧問汾陽如何是祖師西來意汾陽答云青絹扇子足風涼敢問諸人且道與趙州柏樹子話相去多少若能於此揀辨得出便見二大老一等垂慈不覺舌頭拖地若也明辨不出青絹扇子足風涼不妨拈來頓在面前東咬西咬東囓西囓忽然於沒滋沒味處蹉口咬著便見盡大地風颯颯地便知十智同真真同十智以至臨濟四料揀四賓主四照用三玄三要總不離遮一著子便可轉天關回地軸申出三頭六臂著光明衣説報身佛著清淨衣説法身佛且道千百億化身著什麼衣苟或不然且聽一頌當陽拈起足清風似月團團樣不同臘月也知無用處暑天消得打蚊蟲上堂上無敵下無比擬議思量劒去久矣見得親用得到信手拈來又却恰好僧問慈明如何是佛水出高原只遮一句一大藏教説不到十大論師翻不出六代祖師提不起天下老和尚嚼不碎是汝諸人還知落處麼眼裏耳裏鼻裏聞底見底説底一時拈却莫有道得底麼若也道得三世諸佛只是西天老比丘六代祖師在你鼻尖上天下老和尚喚來洗腳豈不見溈山秀和尚頌云衝斷雲根瀉出來泠泠千古下崔嵬未知的的朝宗意更聽春深動地雷是汝諸人還明得的的朝宗之意也無莫是衝斷雲根瀉出來泠泠千古下崔嵬麼或若未然更聽春深動地雷山僧到遮裏已是口啞舌禿謾借古詩一首為諸人頌出穿雲迸石不辭勞大底還他出處高溪澗豈能留得住終歸大海作波濤上堂步行騎水牛空手把鋤頭人從橋上過橋流水不流一理足萬事周一塵起大地收機先別有活路開口不在舌頭復有什麼人同明如是事試舉看僧問楊岐如何是佛答云三腳驢子弄蹄行仰山道日午打三更要見仰山即易要見楊岐即難要見楊岐即易要會三腳驢子弄蹄行即難會得三腳驢子弄蹄行更有步行騎水牛空手把鋤頭人從橋上過橋流水不流在是汝諸人且道與三腳驢子弄蹄行相去多少還辨明得出麼脫或未然更聽一頌老杜風前得句時等間開口便成詩就中一著沒巴鼻却把驢兒當馬騎上堂動即影現覺即氷生見聞俱盡視聽如盲有麼試舉看青原思和尚問六祖作何所務即不落階級才有所重便成窠臼祖云汝曾作什麼來倒借一問原云聖諦亦不為誰與麼道祖云落何階級慣得其便原云聖諦尚不為落何階級特地一場愁祖云如是如是善自護持伎倆已盡生佛未具世界未立以前田地細入鄰虗大包無外間不容髮只貴直下承當領箇現成受用只箇領字已是多了也莫教動著纖塵便見堆山積嶽所以古人道至道無難惟嫌揀擇但莫憎愛洞然明白是汝諸人還得明白也未脫或不然聽取一頌一掬澄潭鏡樣磨無風何必自生波轉身縱不離初際仔細看來較幾何上堂本無位次不涉安排泯然自盡一種平懷黑山下鬼窟裏則且置見聞外聲色先試舉看藥山在石頭會下坐次石頭問云子作箇什麼答云一物也不為石頭云與麼則間坐也藥云間坐即為也石頭云子道不為又不為箇什麼云千聖亦不識石頭乃作偈讚云從來共住不知名任運相將只麼行自古聖賢猶不識造次凡流豈可明藥山父子可謂針芥相投不間毫髮又如兩鏡相照不留影迹是則固是未免喪我兒孫當時見他道一物也不為便與劈脊痛棒今日門風未到如此與麼則間坐也又却不妨軟頑間坐即為也擡腳不起子道不為又不為箇什麼泥裏洗土千聖亦不識元來只在遮裏只如藥山道一物也不為且道在什麼處安身立命石頭道與麼則間坐也且道還有計較處也無若向遮裏檢點得出許你於佛法有箇入處若也檢點不出豈不見五祖演和尚頌云任運不知名輕輕著眼聽水上青青緑元來是浮萍大小五祖只在背後叉手仰山即不然試聽一頌平常間坐與間行嶺上無心雲片生照鏡俱亡人不立依前日午打三更上堂依依稀稀倣倣佛佛瞞瞞盰盰淈淈𣸩𣸩取不得捨不得名不得狀不得不可得中只麼得且道得箇什麼試舉看洞山請泰首座喫果子次問云有一物上拄天下拄地黑律漆常在動用中動用中收不得過在什麼處泰云過在動用中洞山令人掇退果卓五祖戒別泰首座云明朝更獻楚王看大溈哲云汝等諸人還知洞山落處麼若也不知往往作是非得失會去山僧道遮果子非但泰首座不得喫設使盡大地人來也不敢正眼覷著雲蓋本云雖則洞山有打破虗空底鉗鎚要且無補綴底針線待伊道過在動用中但云首座喫果子泰首座若是箇衲僧喫了也須吐却只如諸大老激揚且道自己有什麼干涉有一物上拄天下拄地黑律漆是什麼物既是常在動用中為什麼動用中收不得洞山問泰首座道過在什麼處意作麼生泰首座道過在動用中被洞山掇退果卓泰首座得果子喫不得果子喫五祖道明朝更獻楚王看且道與過在動用中相去多少大溈云諸人還知洞山落處麼且道落在什麼處若也不知往往作是非得失會去自是大溈作遮見解遮果子非但泰首座不得喫設使盡大地人來也不敢正眼覷著覷著則瞎雲蓋云洞山雖有打破虗空底鉗鎚且無補綴底針線杜撰不少待伊道過在動用中但云請首座喫果子不勞拈出泰首座若是箇衲僧喫了也須吐却特地一場愁五祖大溈雲蓋三人與麼説話要見洞山大遠在山僧今日忍俊不禁為諸人別行一路有一物上拄天下拄地黑律漆拈拄杖常在動用中動用中收不得過在什麼處卓一下當時若下得遮一著縱使盡大地是一枚果子也須粉碎更聽一頌樹頭金果鐵團欒千聖猶難著眼看莫謂臨機曾掇退當陽托出已和盤上堂虗而靈空而妙冷而看默而照亭亭雪沒青松杳杳雲藏白鳥正恁麼時還有相見分也無試舉看曹山因鏡清問云清虗之理畢竟無身時如何曹山答云理即如是事作麼生鏡清云如理如事曹山云瞞曹山一人即得爭奈諸聖眼何鏡清云若無諸聖眼爭鑑得箇不與麼曹山云官不容針私通車馬後來大溈哲云是則曹山善切磋琢磨其奈鏡清玉本無瑕雖然不經敏手終成廢器仰山道曹山與鏡清與麼挨拶與麼敲唱固在天地未判佛祖未彰以前著到且道與老洞山五位君臣還有親炙分也無山僧今日不顧諸方笑怪試為點檢看清虗之理畢竟無身莫是正位麼曹山云理即如是事作麼生莫是偏位麼鏡清云如理如事喚作正中偏即是偏中正即是曹山云瞞曹山一人即得爭奈諸聖眼何鏡清云若無諸聖眼爭鑑得箇不與麼曹山云官不容針私通車馬若是偏正兩忘處且喜鏡清曹山俱踏不著所謂兼中到不涉有無誰敢和人人盡謂出常情折合還歸炭裏坐殊不知正是見滲漏情滲漏語滲漏好喫三十拄杖大小大溈道曹山是則善切磋琢磨其奈鏡清玉本無瑕雖然不經敏手終成廢器還曾夢見二大老麼仰山如此説話莫別有長處麼聽取一頌洪蒙未判絶疏親畢竟難將事理分夜半正明還不露金剛腦後鐵崑崙上堂肘後符靈聲前眼活有收有放全生全殺白象崑崙騎黑狗爛銀蹄畢竟作麼生辨九峯普滿禪師問僧甚處來云閩中來九峯云遠涉不易僧云也不難動步便到九峯云還有不動步者麼僧云有九峯云爭得到遮裏僧無語九峯云誤殺一船人拈棒劈脊趂下九峯老漢雖是洞山真子却有臨濟作略問僧甚麼處來僧云閩中來九峯云遠涉不易豈不是道出平常僧云也不難動步便到相隨來也峯云還有不動步者麼易分雪裏粉僧云有難辨墨中煤峯云爭得到遮裏回途不復妙僧無語覿面沒相呈峯云誤殺一船人拈拄杖劈脊趂出靈山授記也不到如此汝等諸人要識九峯麼他當初與曹山本寂章禪師雲居弘覺膺禪師同參老洞山取重一時然曹山當時其道盛行不下洞山故稱為曹洞一宗觀其密受寶鏡三昧五位君臣三種滲漏之旨當續洞下正傳返無其傳者何也才有密傳則成死句所以道須參活句莫參死句死句下薦得自救不了活句下薦得可與佛祖為師正如臨濟大師與克符道者發明四種料揀三玄三要四賓四主亦不得其傳得其傳乃興化於大覺棒頭悟得先師在黃蘗喫棒要旨將知道體履箇事須是各各自證自悟始得斷非口耳可以傳受文字語言可以啖是汝諸人聞與麼道莫有為古人作主的麼出來對衆道看如無聽取一頌雲重重又水重重步不曾移到九峯遠涉若還言不易主人却在半途中上堂石女高歌木人和妙用縱橫無不可三更初夜月明前開口幾人曾蹉過試舉看同安丕和尚僧問如何是和尚家風答云金雞抱子歸霄漢玉兔懷胎下紫宸又問忽遇客來將何祗待答云金果早朝猿摘去玉花午後鳳銜來同安老漢與麼答話是則隨家豐儉只是未免太尊貴生亦未免墮在尊貴中是汝諸人還知遮老漢落處也無只如道金雞抱子歸霄漢玉兔懷胎下紫宸與金果早朝猿摘去玉花午後鳳銜來正耶偏耶正中來耶偏中至耶兼中到耶若也向這裏辨明得出四句只是一句五位只是一位若也辨明不出你日日從朝至暮行住坐臥折旋俯仰著衣喫飯展鉢開單與金雞抱子歸霄漢玉兔懷胎下紫宸之句還有親疏也無還有優劣也無山僧今日開遮兩片皮已是誤賺後昆等是不怕傍觀試與一頌白玉階前金鳳舞黃金殿上玉雞鳴正中來與兼中到昨夜雲深月正明上堂雲藏無縫襖花綻不萌枝銅壺漏靜玉戶春熙敢問時人知不知試舉看同安志禪師僧問凡有言句盡落今時學人上來請師直指答云目前不現句後不迷又問如何是向上事迥然不換標的即乖兄弟還知同安老漢落處麼只如道目前不現句後不迷是什麼消息又如道迥然不換標的即乖又作麼生山僧到此不免描畫太虗試説一偈天黑雲深飛暮鴉鷺鷥立雪對蘆花幸然不屬今時事句後聲前會即差上堂內紹外紹有偏有正失曉老婆逢古鏡正與麼時是什麼消息試舉看梁山和尚僧問師唱誰家曲宗風嗣阿誰答云龍生龍子鳳生鳳兒太尊貴生汝等諸人還知梁山落處麼開口不在舌頭上若作龍生龍子鳳生鳳兒會也不得不作龍生龍子鳳生鳳兒會也不得聽取一頌鷺鷥立雪非同色明月蘆花不似他若作龍生龍子會目前一路已千差上堂聲色無依見聞不立渡水問魚蹤過山尋蟻迹畢竟是什麼消息試舉看太陽明安問僧甚處來僧云洪山來明云先師在麼僧云在明云在則不無請渠出來我要相見僧云𠰚明云猶是侍者僧無對明云喫茶去挹流尋源披砂揀金則不無大陽明安老漢其奈對面不相識問僧甚處來洪山來相見了也無端道箇先師在麼請渠出來我要相見可惜不與當面一喝僧云𠰚帶水拖泥不少明云猶是侍者家無小使不成君子僧無對明云喫茶去遮裏見得太陽明安老人和遮僧一狀領過其或未然明安每常示衆云諸禪德須會平常無生句妙玄無私句體明無盡句第一句通一路第二句無賓主第三句兼帶去縱也周遍十方橫也一時坐却正與麼時莫有通得箇消息的麼若也通得箇消息大衆證明若通不得明朝更獻楚王看時有僧出問如何是平常無生句答云白雲覆青山青山不露頂如何是妙玄無私句答云古殿無人不侍立不種梧桐免鳳來如何是體明無盡句答云手指空時天地靜回途石馬出紗籠又問如何是師子嚬申答云終無回顧意爭肯墮平常如何是獅子返擲答云周旋往返全歸主繁興大用體無私如何是獅子踞地答云迥絶去來蹤古今無變異又云莫行心處路莫坐無處功有無二俱遣廓然天地空大小大陽盡力道只道得箇廓然天地空且道是平常無生句是妙玄無私句是體明無盡句汝等諸人若向遮裏明辨得出師子嚬申師子返擲獅子踞地杳絶蹤由便會得白雲覆青山青山頂不露古殿無人不侍立不種梧桐鳳不來手指空時天地靜回途石馬出紗籠至於正中偏偏中正正中來兼中到總不離遮箇時節且道是什麼時節問僧甚處來答云洪山來先師在麼在在則不無請渠出來我要相見僧云𠰚至於喫茶去試聽一頌動絃別曲古今稀覿面相呈第二機祖父不曾離正位一簾化日自遲遲上堂動即影現拂即成痕聽其自在萬法無根試舉看華嚴青禪師示衆云鸞鳳沖霄不留影迹靈羊挂角那覔蹤由與麼説話美則美矣善則未善鸞鳳沖霄此其迹也靈羊挂角此其蹤也且道與未沖霄未挂角以前相去多少明眼漢緇素得出不必論正中偏偏中正正中來偏中至兼中到五位只是一位一位中藏五位還信得及麼更聽一頌玄路絶時分鳥道見聞泯處涉功勳何如只麼間間地月浸氷壺夜不痕上堂形名未立朕兆未分全無巴鼻徹底渾崙且道什麼時節有與麼提掇試舉看僧問芙蓉和尚如何是無縫塔答云白雲籠嶽頂終不露崔嵬且道是明一色邊事耶是同中異異中同耶是兼中到偏中至正中來耶若也明辨得出無縫塔只在眉毛眼睫上放大光明照耀塵沙剎海直得地搖六震天雨四花還信得及麼脫或未然更聽一頌層層落落影團團切忌當陽著眼看直下有無俱不立白漫漫又黑漫漫上堂行也是坐也是俯仰折旋無是不是然雖如是一翳在目空花亂墜正恁麼時莫有同啐同同得同失者麼試舉看大溈祐禪師初參百丈值夜侍立次百丈問云看爐內有火也無溈看了來報曰無丈躬起至爐深撥得一星火挾起曰汝道無遮箇聻溈忽然契悟丈乃云欲識佛性義當觀時節因緣時節若至其理自彰汝今方省己物不從他得冬瓜印子百丈當初參馬祖侍行次見一羣野鴨飛過祖問曰是什麼丈云野鴨子祖云甚麼處去也丈云飛過去也祖回首將百丈鼻頭一搊丈乃作引痛聲祖曰又道飛過去也丈乃有省得非源既爾而流亦然然亦熟處難忘未免纍他溈山坐在聲色堆裏轉身不得當時若解對他拈出再參馬祖底則後代兒孫未致寂寥山僧不拍攙行奪市謾與下箇注腳值夜侍立幸自可憐生汝看爐中有火也無無端無端溈云無火不知燎却眉毛了也百丈躬起深撥得一星示云聻邪法難扶溈山有省入地獄如箭更聽一頌道箇爐中無火時一團冷𦦨正騰輝深深撥出一星子未免翻成節外枝上堂寸長尺短三平二滿覿面相呈語言道斷有麼試舉看溈山因劉鐵磨到山云老牸牛汝來也磨云來日臺山大會有齋和尚還去麼溈山放身作臥勢磨便出遮兩箇老子是則傾蓋相逢握鞭回首還免得傍觀笑怪也無點檢將來縱使八角磨盤空裏走還出得遮縵天網子麼後來雪竇和尚頌云曾騎鐵馬入重城勑下傳聞六國清猶握金鞭問歸客夜深誰共御街行明眼衲僧試商略看且道落在溈山分上劉鐵磨分上若是英俊道流未舉先知山僧今日為諸人效顰亦資一語岸草青青得自由等間牽著便昂頭通身露地一般白莫是山前水牯牛上堂一有多種二無兩般鈎頭識取莫認定盤有麼試舉看溈山與仰山摘茶次溈山云終日只聞子聲不見子形仰山撼茶樹溈山云子只得其用不得其體仰山云和尚作麼生溈山良久仰山云和尚只得其體不得其用溈山云放子三十棒父慈子孝大有可觀溈山與仰山雖則以鏡照鏡似金博金未免通身泥水終日只聞子聲不見子形道甚麼仰山撼茶樹倚草附木溈云子只得其用不得其體別有那仰山云和尚作麼生溈乃良久死水不藏龍仰山云和尚只得其體不得其用相隨來也溈云放子三十棒棒教誰喫更聽一頌何須特地弄精魂摘葉尋枝我不能固是話頭成兩橛不妨同玩雨前春上堂機不離位墮在毒海語不離位沈于醉鄉雖然如是出格道得一句何如只麼平常有麼試舉看仰山問溈山如何是西來意溈云大好燈籠仰云莫只遮箇便是麼溈云只遮箇是什麼仰云大好燈籠溈云果然不識溈山父子絲來線去作家則始終作家逐色隨聲敗闕則彼此敗闕若是凡聖情盡體露真常事理不二即如如佛其奈細如毫末滿口氷霜汝等諸人便向遮裏見得溈仰父子識得溈仰宗旨以拂打一圓相云總跳遮箇不出還識麼竪拂云還見麼其或未然更與從頭點破如何是西來意劄大好燈籠露莫只遮箇便是麼賣俏放憨只遮箇是什麼放憨賣俏大好燈籠相隨來也果然不識埋沒人不少且道埋沒什麼人試聽一頌覿面提來付與伊分明此意沒東西腕頭有力千鈞重誰道通身是水泥上堂一種平懷泯然自盡明暗情忘事理平等撒開漫天鐵網且道還有透漏也無試舉看溈山一日在方丈坐靜處乾坤大間中日月長見仰山從外入來乃轉面向裏風悄悄地仰山云慧寂是和尚弟子不用形迹見什麼溈山作起勢可惜無主人公仰山便出看腳下溈山召云寂子仰山回首聽事不真溈山云聽老僧説箇夢切忌寐語仰山作聽勢沒伎倆溈山云汝為原看有什麼難仰山取手巾一盆水來我道只與麼溈山洗面了坐猶未醒在香嚴自外入來更添一分溈山云適間與寂子作一上神通不同小小猶自寐語在香嚴云智間在下了了得知真箇那溈山云子試道看香嚴點一杯茶來同坑無異土溈山乃歎云二子神通過如鶖子有縱有奪有殺有活溈山父子是則是法喜禪悅一時遊戲其奈千古之下有人檢點佛鑑勤和尚道夢中説夢深許溈山妙用神通還他二子擎茶度水耀古騰今年老心孤憐兒惜子向衲僧門下過一人在門外一人在門內更有一人遍界不能藏佛眼不見汝等諸人還檢點得出麼其或未然却聽下箇注腳夢中説夢深許溈山妙用神通還他二子是肯是不肯擎茶度水耀古騰今年老心孤憐兒惜子是褒是貶若向衲僧門下過一人在門外一人在門內更有一人遍界不能藏佛眼不見若也揀辨得出非特看破溈山仰山而亦便見佛鑑老人無端敗闕聽取一頌一杯晴雪早茶香午睡方醒春晝長拶著通身俱是眼半窗疏影轉斜陽
